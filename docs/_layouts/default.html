<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <!-- GRC Engineering Design System — self-hosted brand fonts -->
  <link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/general-sans-vf.woff2' | relative_url }}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/satoshi-vf.woff2' | relative_url }}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/archivo-vf.woff2' | relative_url }}" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% seo %}
  <script>
    // GRC Engineering theme — resolve light/dark/system to a concrete data-theme
    // BEFORE paint so OS-dark users never see a light flash. Stores the user's
    // choice under localStorage["grc-theme"] (the design-system convention).
    (function() {
      function systemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function apply(pref) {
        var theme = pref === 'system' ? systemTheme() : pref;
        var el = document.documentElement;
        el.setAttribute('data-theme', theme);
        el.setAttribute('data-theme-preference', pref);
      }
      apply(localStorage.getItem('grc-theme') || 'system');

      // Track the OS scheme while in system mode, and stay in sync across tabs.
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
        if ((localStorage.getItem('grc-theme') || 'system') === 'system') apply('system');
      });
      window.addEventListener('storage', function(e) {
        if (e.key === 'grc-theme') apply(e.newValue || 'system');
      });
    })();
  </script>
</head>
<body>
  {% include header.html %}

  <main class="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Theme toggle — cycles light → dark → system (GRC Engineering ThemeToggle)
    document.addEventListener('DOMContentLoaded', function() {
      var themeToggle = document.getElementById('theme-toggle');
      if (!themeToggle) return;
      var order = ['light', 'dark', 'system'];

      function systemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function apply(pref) {
        var theme = pref === 'system' ? systemTheme() : pref;
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-theme-preference', pref);
      }

      themeToggle.addEventListener('click', function() {
        var current = localStorage.getItem('grc-theme') || 'system';
        var next = order[(order.indexOf(current) + 1) % order.length];
        localStorage.setItem('grc-theme', next);
        apply(next);
      });
    });
  </script>
</body>
</html>
