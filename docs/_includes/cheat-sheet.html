<div class="cheat-sheet-wrapper" id="cheat-sheet-wrapper">

  <div class="view-mode-bar">
    <div class="view-mode-label">View:</div>
    <div class="view-mode-toggle" role="group" aria-label="Guide view mode">
      <button class="view-mode-btn active" id="btn-full" onclick="setGuideView('full')" aria-pressed="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        Full Guide
      </button>
      <button class="view-mode-btn" id="btn-cheat" onclick="setGuideView('cheat')" aria-pressed="false">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="3" y1="15" x2="21" y2="15"></line>
          <line x1="9" y1="9" x2="9" y2="21"></line>
        </svg>
        Cheat Sheet
      </button>
    </div>
  </div>

  <div class="cheat-sheet-panel" id="cheat-sheet-panel" aria-hidden="true" hidden>
    <div class="cheat-sheet-header">
      <h2 class="cheat-sheet-title">{{ page.vendor }} — Requirements Cheat Sheet</h2>
      <p class="cheat-sheet-subtitle">All controls condensed. Click any requirement to jump to full implementation details.</p>
    </div>

    <div class="cheat-sheet-table-wrap">
      <table class="cheat-sheet-table">
        <thead>
          <tr>
            <th class="col-req">Requirement</th>
            <th class="col-desc">Description</th>
            <th class="col-rat">Rationale</th>
          </tr>
        </thead>
        <tbody id="cs-tbody">
          <!-- dynamically populated from guide content by JS below -->
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';
  var STORAGE_KEY = 'hth-guide-view';
  // Matches control headings like "1.1 Name", "10.3 Name"
  var CTRL_RE = /^(\d+(?:\.\d+)+)\s+(.+)/;
  var built = false;

  function parseLevel(str) {
    var m = str.match(/^(L\d+)\s*\(([^)]+)\)/i);
    if (m) return { code: m[1].toUpperCase(), name: m[2] };
    m = str.match(/^(L\d+)/i);
    if (m) return { code: m[1].toUpperCase(), name: str.slice(m[1].length).replace(/^\s*[-:(,]\s*/, '').trim() };
    return { code: 'L?', name: str };
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Walk the guide DOM and extract control data directly from the rendered content.
  // This means the cheat sheet is always in sync with the guide — no separate data file.
  function buildCheatSheet() {
    var guideBody = document.querySelector('.guide-body');
    if (!guideBody) return [];

    var controls = [];
    var h3s = Array.prototype.slice.call(guideBody.querySelectorAll('h3'));

    h3s.forEach(function(h3) {
      var m = CTRL_RE.exec(h3.textContent.trim());
      if (!m) return;

      var ctrl = {
        num: m[1],
        name: m[2],
        level: null,
        description: '',
        why: [],
        attack: '',
        packLinks: [],
        anchorId: h3.id || ''
      };

      var inDescription = false;
      var inRationale = false;
      var prevWasWhy = false;
      var node = h3.nextElementSibling;

      while (node && node.tagName !== 'H3') {
        var tag = node.tagName;

        if (tag === 'H4') {
          var h4t = node.textContent.trim().toLowerCase();
          inDescription = (h4t === 'description');
          inRationale = (h4t === 'rationale');
          prevWasWhy = false;

        } else if (tag === 'P') {
          var strong = node.querySelector('strong');
          if (strong) {
            var keyText = strong.textContent.trim();
            // Strip trailing colon for matching
            var keyLower = keyText.replace(/:$/, '').trim().toLowerCase();
            // Value = node text minus the strong text (and optional colon)
            var nodeText = node.textContent.trim();
            var afterKey = nodeText.slice(nodeText.indexOf(keyText) + keyText.length)
                                   .replace(/^\s*:?\s*/, '').trim();

            if (/^profile[\s_]?level/.test(keyLower)) {
              ctrl.level = parseLevel(afterKey);
            } else if (/^attack[\s_]?prevented/.test(keyLower)) {
              ctrl.attack = afterKey;
            } else if (/^why\s+this\s+matters/.test(keyLower)) {
              prevWasWhy = true;
            }
          } else if (inDescription && !ctrl.description) {
            var txt = node.textContent.trim();
            if (txt) { ctrl.description = txt; inDescription = false; }
          }

        } else if (tag === 'UL') {
          // Capture Why This Matters bullets regardless of whether there was an h4 Rationale
          // — covers both the "Rationale" section pattern and the inline bold heading pattern
          if ((inRationale || prevWasWhy) && !ctrl.why.length) {
            ctrl.why = Array.prototype.slice.call(node.querySelectorAll('li'))
                            .map(function(li) { return li.textContent.trim(); });
          }
          prevWasWhy = false;

        } else if (node.classList && node.classList.contains('pack-code-section')) {
          // Pull the pack type from the type badge class and the GitHub source URL
          var typeEl = node.querySelector('[class*="pack-type-"]');
          var typeMatch = typeEl ? typeEl.className.match(/pack-type-(\w+)/) : null;
          var packType = typeMatch ? typeMatch[1] : 'code';
          var srcLink = node.querySelector('.pack-source-link');
          if (srcLink) {
            ctrl.packLinks.push({ type: packType, url: srcLink.href });
          }

        } else {
          prevWasWhy = false;
        }

        node = node.nextElementSibling;
      }

      if (ctrl.level) controls.push(ctrl);
    });

    return controls;
  }

  function groupByLevel(controls) {
    var seen = Object.create(null);
    var order = [];
    controls.forEach(function(c) {
      var code = c.level.code;
      if (!seen[code]) {
        seen[code] = { code: code, name: c.level.name, controls: [] };
        order.push(code);
      }
      seen[code].controls.push(c);
    });
    // Sort groups by level number so L1 < L2 < L3 < L4
    order.sort(function(a, b) {
      return parseInt(a.slice(1), 10) - parseInt(b.slice(1), 10);
    });
    return order.map(function(code) { return seen[code]; });
  }

  function renderTable(controls) {
    var tbody = document.getElementById('cs-tbody');
    if (!tbody) return;

    var groups = groupByLevel(controls);
    var html = '';

    groups.forEach(function(g) {
      var cls = g.code.toLowerCase();
      html += '<tr class="level-header-row level-' + cls + '">'
            + '<td colspan="3">'
            + '<span class="level-badge level-badge-' + cls + '">' + esc(g.code) + '</span>'
            + esc(g.name)
            + '</td></tr>';

      g.controls.forEach(function(c) {
        // Requirement cell
        var reqCell = '<td class="col-req">'
          + '<a href="#' + esc(c.anchorId) + '" class="ctrl-link"'
          + ' onclick="jumpToControl(' + JSON.stringify(c.num) + ');return false;">'
          + '<span class="ctrl-num">' + esc(c.num) + '</span>'
          + esc(c.name)
          + '</a>';

        if (c.packLinks.length) {
          reqCell += '<div class="cs-pack-links">';
          c.packLinks.forEach(function(pk) {
            reqCell += '<a href="' + esc(pk.url) + '" target="_blank" rel="noopener noreferrer"'
              + ' class="cs-pack-badge cs-pack-' + esc(pk.type) + '"'
              + ' title="Code Pack: ' + esc(pk.type) + ' — view source on GitHub">'
              + esc(pk.type) + '</a>';
          });
          reqCell += '</div>';
        }
        reqCell += '</td>';

        // Description cell
        var descCell = '<td class="col-desc">' + esc(c.description) + '</td>';

        // Rationale cell
        var ratCell = '<td class="col-rat">';
        if (c.why.length) {
          ratCell += '<ul class="rat-list">';
          c.why.forEach(function(b) { ratCell += '<li>' + esc(b) + '</li>'; });
          ratCell += '</ul>';
        }
        if (c.attack) {
          ratCell += '<p class="attack-prevented"><strong>Attack Prevented:</strong> ' + esc(c.attack) + '</p>';
        }
        ratCell += '</td>';

        html += '<tr class="control-row">' + reqCell + descCell + ratCell + '</tr>';
      });
    });

    tbody.innerHTML = html;
  }

  function ensureBuilt() {
    if (built) return;
    built = true;
    var controls = buildCheatSheet();
    if (!controls.length) {
      // No standard controls found in this guide — hide the toggle entirely
      var wrapper = document.getElementById('cheat-sheet-wrapper');
      if (wrapper) wrapper.style.display = 'none';
      return;
    }
    renderTable(controls);
  }

  function setGuideView(mode) {
    var isCheat = (mode === 'cheat');
    var gc = document.querySelector('.guide-content');
    var panel = document.getElementById('cheat-sheet-panel');
    var btnFull = document.getElementById('btn-full');
    var btnCheat = document.getElementById('btn-cheat');
    if (!gc || !panel) return;

    if (isCheat) {
      ensureBuilt();
      gc.classList.add('guide-content--hidden');
      panel.hidden = false;
      panel.setAttribute('aria-hidden', 'false');
      btnFull.classList.remove('active');
      btnFull.setAttribute('aria-pressed', 'false');
      btnCheat.classList.add('active');
      btnCheat.setAttribute('aria-pressed', 'true');
    } else {
      gc.classList.remove('guide-content--hidden');
      panel.hidden = true;
      panel.setAttribute('aria-hidden', 'true');
      btnFull.classList.add('active');
      btnFull.setAttribute('aria-pressed', 'true');
      btnCheat.classList.remove('active');
      btnCheat.setAttribute('aria-pressed', 'false');
    }

    try { sessionStorage.setItem(STORAGE_KEY, mode); } catch(e) {}
  }

  function jumpToControl(num) {
    setGuideView('full');
    setTimeout(function() {
      var hs = document.querySelectorAll('.guide-body h3');
      for (var i = 0; i < hs.length; i++) {
        if (hs[i].textContent.trim().indexOf(num + ' ') === 0) {
          hs[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }
      }
    }, 80);
  }

  window.setGuideView = setGuideView;
  window.jumpToControl = jumpToControl;

  document.addEventListener('DOMContentLoaded', function() {
    try {
      if (sessionStorage.getItem(STORAGE_KEY) === 'cheat') setGuideView('cheat');
    } catch(e) {}
  });
})();
</script>
