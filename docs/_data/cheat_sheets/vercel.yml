levels:
  - code: L1
    name: Crawl
    controls:
      - num: "1.1"
        name: Enforce SSO with SAML
        description: Configure SAML Single Sign-On to centralize authentication through your identity provider and eliminate password-based Vercel logins.
        why:
          - Centralizes authentication policy enforcement through your IdP
          - Enables MFA enforcement at the IdP level rather than relying on individual user compliance
          - Provides single point of revocation when employees leave
        attack: Credential stuffing, password reuse, unauthorized access after employee departure

      - num: "1.3"
        name: Enforce Least-Privilege RBAC
        description: Configure team and project-level role-based access control using Vercel's granular role system and Access Groups.
        why:
          - Prevents over-privileged access to production environments
          - Developers cannot modify production environment variables without explicit elevation
          - Security role enables firewall management without deployment access
        attack: Insider threat, privilege escalation, unauthorized production modifications

      - num: "1.4"
        name: Harden API Token Lifecycle
        description: Enforce scoped, time-limited API tokens and replace long-lived credentials with OIDC federation where possible.
        why:
          - Vercel enforces 90-day maximum lifetime on granular tokens
          - Classic tokens have been revoked platform-wide
          - OIDC federation eliminates static credentials entirely for cloud provider access
          - 2FA is required by default for token creation
        attack: Token theft, credential leakage in CI/CD logs, unauthorized API access

      - num: "1.5"
        name: Audit Third-Party Integrations and OAuth Grants
        description: Maintain an inventory of all Marketplace integrations, Git connections, deploy hooks, and third-party OAuth grants. Review quarterly.
        why: []
        attack: Vendor-to-vendor OAuth supply-chain compromise, orphaned integration privileges, deploy-hook URL leakage

      - num: "2.1"
        name: Configure Deployment Protection
        description: Enable multi-layered deployment protection using Vercel Authentication, password protection, and trusted IPs to prevent unauthorized access to preview and production deployments.
        why:
          - Preview deployments can expose unreleased features, staging credentials, and internal APIs
          - Unprotected preview URLs are indexed by search engines and discoverable by attackers
          - Production environment variables can leak through unprotected preview deployments
        attack: Unauthorized access to staging environments, information disclosure via preview URLs, credential harvesting from preview deployments

      - num: "2.2"
        name: Harden Git Integration
        description: Secure the Git integration pipeline to prevent unauthorized deployments from forks, unverified commits, and compromised repositories.
        why:
          - Fork-based deployments can inject malicious code into your deployment pipeline
          - Unverified commits may contain unauthorized changes
          - Unrestricted deployment triggers enable supply chain attacks
        attack: Supply chain injection via forks, unauthorized code deployment, commit impersonation

      - num: "3.2"
        name: Configure IP Blocking and Rate Limiting
        description: Implement IP-based access control and rate limiting to protect against brute force attacks, abuse, and targeted threats.
        why:
          - IP blocking available on all plans (Hobby 10, Pro 100, Enterprise custom)
          - Rate limiting prevents brute force, credential stuffing, and API abuse
          - Persistent actions automatically block repeat offenders for configurable durations
        attack: Brute force attacks, credential stuffing, API abuse, scraping, DDoS amplification

      - num: "4.2"
        name: Configure DDoS Protection and Attack Challenge Mode
        description: Leverage Vercel's automatic DDoS mitigation and configure Attack Challenge Mode for active attack response.
        why:
          - Automatic L3/L4/L7 DDoS mitigation on all plans at no cost
          - Blocked DDoS traffic is not billed
          - Attack Challenge Mode provides an additional layer during active targeted attacks
          - System Bypass Rules prevent legitimate traffic from being blocked
        attack: Volumetric DDoS, SYN floods, application-layer floods, amplification attacks

      - num: "5.1"
        name: Configure Security Response Headers
        description: Configure CSP, X-Frame-Options, Referrer-Policy, and other security headers. Vercel does not set these automatically beyond HSTS — you must configure them.
        why:
          - Vercel auto-configures HSTS but no other security headers
          - Missing CSP enables XSS; missing X-Frame-Options enables clickjacking
          - Security headers are the primary defense against client-side attacks
          - Headers must be set by the customer per Vercel's shared responsibility model
        attack: Cross-site scripting (XSS), clickjacking, MIME-type sniffing, referrer leakage, unauthorized API embedding

      - num: "6.1"
        name: Environment Variable Security
        description: Implement secure environment variable management with proper scoping, mandatory Sensitive flag, and access controls. Enforce Sensitive Environment Variables policy is a baseline L1 control post April 2026.
        why: []
        attack: Secret exposure in client bundles, credential leakage via preview deployments, unauthorized production secret access

      - num: "6.3"
        name: Rotate Deploy Hooks
        description: Deploy Hook URLs accept unauthenticated POST requests — the URL is the credential. Rotate quarterly, on team membership changes, and whenever a hook URL may have been exposed.
        why: []
        attack: Unauthorized deployment triggering, pipeline poisoning via leaked hook URLs, lateral movement through broad GitHub App scope

      - num: "6.4"
        name: Block NEXT_PUBLIC_ Secret Leaks in CI
        description: Add a CI/pre-commit check that fails the build if any environment variable prefixed NEXT_PUBLIC_ carries a secret-shaped name, since Next.js inlines these values into the client bundle.
        why: []
        attack: Client-side secret exposure, automated secret-scanner-driven credential theft, search-engine-indexed API keys

      - num: "7.1"
        name: Prevent Subdomain Takeover
        description: Audit DNS records to prevent subdomain takeover vulnerabilities when CNAME records point to Vercel without active deployments.
        why:
          - Dangling DNS records pointing to Vercel can be claimed by attackers
          - Subdomain takeover enables phishing, cookie theft, and CSP bypass
          - Security researchers actively scan for Vercel subdomain takeover opportunities
        attack: Subdomain takeover, phishing via legitimate domain, cookie scope exploitation

      - num: "7.2"
        name: Harden TLS and Certificate Configuration
        description: Verify TLS configuration and optionally deploy custom certificates for domains requiring specific certificate authorities.
        why:
          - Vercel automatically provides TLS 1.2/1.3 with strong ciphers and forward secrecy
          - HSTS is automatic but custom domains lack includeSubDomains and preload by default
          - Post-quantum key exchange (X25519MLKEM768) available for supporting browsers
          - Custom certificates needed for CAA/CT policy compliance in some organizations
        attack: Man-in-the-middle attacks, protocol downgrade attacks, certificate impersonation

      - num: "8.1"
        name: Configure Drains for SIEM
        description: Forward Vercel runtime, build, and firewall logs to your SIEM via Drains for security monitoring and incident response.
        why: []
        attack: Undetected attacks, delayed incident response, evidence loss, compliance gaps in log retention

      - num: "8.3"
        name: Cron Job Security
        description: Secure cron job endpoints with the CRON_SECRET mechanism to prevent unauthorized invocation.
        why:
          - Cron endpoints are publicly accessible URLs without built-in protection
          - Without CRON_SECRET verification, anyone can trigger cron jobs
          - Compromised cron endpoints enable unauthorized data processing or exfiltration
        attack: Unauthorized cron invocation, data exfiltration via scheduled jobs, resource abuse

      - num: "8.4"
        name: Verify Drain Delivery Signatures
        description: Validate the x-vercel-signature HMAC-SHA1 header on every drain payload with a constant-time comparison before processing. Reject unsigned or tampered payloads.
        why: []
        attack: Log injection, forged audit evidence, timing-attack-driven signature recovery

      - num: "9.1"
        name: Next.js Patch Management & Edge Header Strip
        description: Maintain a defensive posture against Next.js CVEs — pin to patched versions, subscribe to advisories, add WAF rules stripping internal headers exploited by known attacks.
        why: []
        attack: Authorization bypass via middleware, RCE via RSC deserialization, SSRF via Server Actions or /_next/image, cache poisoning

      - num: "10.1"
        name: Enforce /_next/image remotePatterns Allowlist
        description: Lock down images.remotePatterns in next.config.* to prevent SSRF via Next.js's /_next/image server-side fetch endpoint.
        why: []
        attack: SSRF against internal networks, cloud metadata exfiltration (AWS IMDSv1), image-optimizer cache poisoning

      - num: "10.2"
        name: Enforce Authorization Defense in Depth
        description: CVE-2025-29927 proved Next.js middleware can be bypassed via a spoofed internal header. Enforce authorization a second time inside Route Handlers, Server Components, and Server Actions.
        why: []
        attack: Authorization bypass via middleware-only enforcement, header smuggling (CVE-2025-29927 and future analogues)

      - num: "10.3"
        name: Do Not Stack a Reverse Proxy in Front of Vercel Bot Protection
        description: Placing a reverse proxy (Cloudflare, Azure Front Door, AWS CloudFront) in front of Vercel breaks Bot Protection — JA3/JA4 fingerprints and client IP stability are masked.
        why: []
        attack: False negatives in bot classification, false positives blocking legitimate users, masked security events

  - code: L2
    name: Walk
    controls:
      - num: "1.2"
        name: Configure Directory Sync (SCIM)
        description: Enable SCIM-based directory synchronization to automatically provision and deprovision team members from your identity provider.
        why:
          - Eliminates manual user lifecycle management
          - Ensures immediate deprovisioning when employees leave
          - Enforces consistent role assignments across the organization
        attack: Orphaned accounts, delayed deprovisioning, unauthorized persistent access

      - num: "2.3"
        name: Configure Rolling Releases
        description: Enable progressive deployment rollouts to limit blast radius of production changes. Pair with Skew Protection so client code and backend APIs always come from the same deployment revision.
        why: []
        attack: Blast radius of compromised deployments, rapid exploitation of deployed vulnerabilities, client/server version mismatch during rollout

      - num: "2.4"
        name: Private Production Deployments
        description: Restrict access to production domains — not just preview URLs — to authenticated users, corporate IP ranges, or password-holders. Requires Enterprise or Pro Advanced Deployment Protection add-on.
        why: []
        attack: Anonymous reconnaissance of production admin surfaces, credential-stuffing at public login pages, automated scanning of production endpoints

      - num: "3.1"
        name: Enable WAF with Managed Rulesets
        description: Enable the Vercel Web Application Firewall with OWASP managed rulesets, bot protection, and AI bot filtering.
        why: []
        attack: SQL injection, XSS, command injection, path traversal, remote file inclusion, bot abuse, AI scraping

      - num: "3.3"
        name: Configure Firewall Persistent Actions
        description: Persistent Actions are time-based IP-level blocks that execute before the request reaches the CDN, preventing bandwidth and compute billing for blocked sources.
        why: []
        attack: Attacker-driven cost amplification, scanner persistence, brute-force credential attacks

      - num: "3.4"
        name: Configure AI Bots Managed Ruleset
        description: Control traffic from known AI crawlers — training crawlers, search-assistant fetches, and generative scrapers — using Vercel's managed AI Bots ruleset.
        why: []
        attack: Unlicensed training data extraction, competitive scraping, elevated costs from unwanted automated traffic

      - num: "6.2"
        name: Deployment Retention Policy
        description: Configure deployment retention policies to automatically remove old deployments that may contain outdated secrets or vulnerable code.
        why:
          - Old deployments remain accessible with their original environment variables
          - Retaining deployments indefinitely increases attack surface
          - Compliance frameworks require data retention policies
        attack: Exploitation of outdated deployments with known vulnerabilities or leaked secrets

      - num: "8.2"
        name: Enable Audit Logging with SIEM Streaming
        description: Enable enterprise audit logging with real-time SIEM streaming to track all administrative actions, configuration changes, and security events.
        why:
          - Audit logs capture 90 days of immutable administrative activity
          - Tracks member changes, environment variable CRUD, deployment protection changes, domain changes, and integration installs
          - SIEM streaming enables real-time alerting on security-relevant events
          - CSV export available for compliance reporting
        attack: Undetected administrative compromise, unauthorized configuration changes, insider threat

  - code: L3
    name: Run
    controls:
      - num: "4.1"
        name: Enable Secure Compute
        description: Deploy Serverless Functions within dedicated private networks with static IPs, VPC peering, and network isolation using Vercel Secure Compute.
        why: []
        attack: Shared IP abuse, unauthorized backend access, network-level lateral movement
