              warn "6.2 Failed to download ${log_id}"
            fi
          done <<< "${LOG_IDS}"
          
          if [[ "${DOWNLOADED}" -gt 0 ]]; then
            pass "6.2 Downloaded ${DOWNLOADED} conversation log file(s) to ${OUT_DIR}"
          else
            warn "6.2 No conversation logs downloaded for window starting ${AFTER}"
          fi

