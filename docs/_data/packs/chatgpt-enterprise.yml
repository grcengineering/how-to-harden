              "financial_transaction_any":             "human_required"
            },
            "approval_logged_actions": {
              "drive_create_or_update_within_owned_folder": "logged",
              "notion_create_page_in_owned_workspace":      "logged",
              "jira_comment_on_owned_ticket":               "logged"
            }
          }
  api:
    lang: "bash"
    filename: "hth-chatgpt-enterprise-6.03-stream-to-siem.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/chatgpt-enterprise/api/hth-chatgpt-enterprise-6.03-stream-to-siem.sh"
    excerpts:
      api-stream-siem:
        content: |2
          # For each event type, resume from the last checkpoint (or 30 days back on
          # first run, the platform retention boundary), pull all available log files,
          # download each, then advance the checkpoint to last_end_time.
          DEFAULT_START="$(date -u -v-30d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          
          for event_type in "${EVENT_TYPES[@]}"; do
            cp_file="${CHECKPOINT_DIR}/${event_type}.cursor"
            cursor="${DEFAULT_START}"
            [[ -f "${cp_file}" ]] && cursor="$(cat "${cp_file}")"
          
            info "Pulling ${event_type} since ${cursor}"
            while :; do
              resp=$(compliance_list_logs "${event_type}" "${cursor}" 100) || {
                fail "6.3 ${event_type} list failed at cursor=${cursor}"
                break
              }
          
              ids=$(echo "${resp}" | jq -r '.data[].id')
              while IFS= read -r log_id; do
                [[ -z "${log_id}" ]] && continue
                out_file="${OUT_DIR}/${event_type}-${log_id}.jsonl"
                compliance_download_log "${log_id}" > "${out_file}" \
                  || warn "6.3 ${event_type} download failed for ${log_id}"
              done <<< "${ids}"
          
              has_more=$(echo "${resp}" | jq -r '.has_more // false')
              next=$(echo "${resp}" | jq -r '.last_end_time // empty')
              if [[ -n "${next}" ]]; then
                echo "${next}" > "${cp_file}"
                cursor="${next}"
              fi
              [[ "${has_more}" == "true" ]] || break
            done
          done
          
          pass "6.3 Continuous export pass complete — schedule via cron every 15 minutes"

"6.4":
  api:
    lang: "bash"
    filename: "hth-chatgpt-enterprise-6.04-detect-trifecta-agents.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/chatgpt-enterprise/api/hth-chatgpt-enterprise-6.04-detect-trifecta-agents.sh"
    excerpts:
      api-detect-trifecta:
        content: |2
          # Classification of OpenAI apps into the trifecta dimensions.
          PRIVATE_DATA="gmail|google-drive|google-calendar|google-docs|sharepoint|onedrive|outlook|salesforce|notion|atlassian-rovo|confluence|jira|github|gitlab|box|dropbox"
          UNTRUSTED_INPUT="gmail|outlook|slack|google-calendar|web-search|browser|notion|confluence|jira"
          EXTERNAL_SEND="gmail|outlook|slack|google-calendar|web-search|browser|github|gitlab|salesforce"
          
          FLAGGED=0
          while IFS=',' read -r agent_id agent_name owner connected_apps; do
            [[ "${agent_id}" == "agent_id" ]] && continue
          
            has_private=$(echo "${connected_apps}" | grep -cE "${PRIVATE_DATA}" || true)
            has_untrusted=$(echo "${connected_apps}" | grep -cE "${UNTRUSTED_INPUT}" || true)
            has_send=$(echo "${connected_apps}" | grep -cE "${EXTERNAL_SEND}" || true)
          
            if [[ "${has_private}" -gt 0 && "${has_untrusted}" -gt 0 && "${has_send}" -gt 0 ]]; then
              fail "6.4 TRIFECTA: agent=${agent_name} (${agent_id}) owner=${owner} apps=${connected_apps}"
              FLAGGED=$((FLAGGED+1))
            fi
          done < "${INPUT}"
          
          if [[ "${FLAGGED}" -eq 0 ]]; then
            pass "6.4 No trifecta-exposed agents detected"
          else
            echo ""
            warn "6.4 ${FLAGGED} agent(s) exposed to the lethal trifecta — require human approval on every external-send action or restrict the connector set"
          fi
  sigma:
    - lang: "yaml"
      filename: "hth-chatgpt-enterprise-6.04-first-mcp-tool-invocation.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/chatgpt-enterprise/siem/sigma/hth-chatgpt-enterprise-6.04-first-mcp-tool-invocation.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection:
                    event_type: 'CONVERSATION_LOG'
                    tool.type: 'mcp'
                condition: selection
                timeframe: 30d
            fields:
                - timestamp
                - agent_id
                - user_email
                - tool.server_url
                - tool.name

"6.5":
