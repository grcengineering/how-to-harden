            summary; exit 0
          }
          
          DOWNLOADED=0
          while IFS= read -r log_id; do
            [[ -z "${log_id}" ]] && continue
            out_file="${OUT_DIR}/${log_id}.jsonl"
            if compliance_download_log "${log_id}" > "${out_file}"; then
              DOWNLOADED=$((DOWNLOADED+1))
