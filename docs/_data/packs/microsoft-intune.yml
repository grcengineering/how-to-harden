"4.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-4.01-multi-admin-approval.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-4.01-multi-admin-approval.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Enable Multi-Admin Approval access protection policies ---
          Write-Host "=== Configuring Multi-Admin Approval ===" -ForegroundColor Cyan
          
          # Get the approver group (must exist already)
          $approverGroupName = "Intune-MultiAdmin-Approvers"
          $approverGroup = Get-MgGroup -Filter "displayName eq '$approverGroupName'" -ErrorAction SilentlyContinue
          
          if (-not $approverGroup) {
              Write-Host "Creating approver group: $approverGroupName" -ForegroundColor Yellow
              $approverGroup = New-MgGroup -DisplayName $approverGroupName `
                  -Description "Approvers for Intune Multi-Admin Approval" `
                  -MailEnabled:$false -MailNickname "intune-maa-approvers" `
                  -SecurityEnabled:$true
              Write-Host "Created approver group. Add at least 2 senior IT/security members." -ForegroundColor Yellow
          }
          
          # Create access protection policy for device wipe actions
          # Note: Multi-Admin Approval is configured in the Intune admin center UI
          # as the Graph API surface is still maturing. Below is the configuration guidance.
          
          Write-Host "`n=== Multi-Admin Approval Configuration Steps ===" -ForegroundColor Cyan
          Write-Host "1. Navigate to: Intune admin center > Tenant administration > Multi-admin approval" -ForegroundColor White
          Write-Host "2. Create access protection policy with these protected actions:" -ForegroundColor White
          Write-Host "   - Device actions: Wipe, Retire, Delete" -ForegroundColor Green
          Write-Host "   - Scripts: PowerShell script deployment, remediation scripts" -ForegroundColor Green
          Write-Host "   - RBAC: Role assignment changes, role definition changes" -ForegroundColor Green
          Write-Host "3. Assign approver group: $approverGroupName" -ForegroundColor White
          Write-Host "4. Set approval timeout: 4 hours" -ForegroundColor White
          Write-Host "5. Require minimum 1 approver (not the requestor)" -ForegroundColor White
          
          Write-Host "`n=== Phase 2 Expansion ===" -ForegroundColor Yellow
          Write-Host "After stabilization, extend Multi-Admin Approval to:" -ForegroundColor Yellow
          Write-Host "   - Compliance policy changes affecting All Devices" -ForegroundColor Yellow
          Write-Host "   - Security baseline modifications" -ForegroundColor Yellow
          Write-Host "   - Conditional Access policy changes" -ForegroundColor Yellow

"5.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-5.01-restrict-wipe-permissions.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-5.01-restrict-wipe-permissions.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Create a dedicated Device Recovery Operator role with ONLY wipe permissions ---
          Write-Host "=== Creating Device Recovery Operator Role ===" -ForegroundColor Cyan
          
          $recoveryPermissions = @{
              actions = @(
                  "Microsoft.Intune_ManagedDevices_Read"
                  "Microsoft.Intune_ManagedDevices_Wipe"
                  "Microsoft.Intune_ManagedDevices_Retire"
                  "Microsoft.Intune_ManagedDevices_FactoryReset"
              )
          }
          
          $recoveryRole = @{
              DisplayName     = "HTH Device Recovery Operator"
              Description     = "Can wipe/retire/reset devices. Protected by PIM + Multi-Admin Approval. Created per HTH Intune hardening guide."
              IsBuiltIn       = $false
              RolePermissions = @(@{
                  ResourceActions = $recoveryPermissions
              })
          }
          
          New-MgDeviceManagementRoleDefinition -BodyParameter $recoveryRole
          Write-Host "Created role: HTH Device Recovery Operator" -ForegroundColor Green
          
          # --- Audit existing roles for wipe permissions ---
          Write-Host "`n=== Auditing Roles with Wipe Permissions ===" -ForegroundColor Yellow
          
          $allRoles = Get-MgDeviceManagementRoleDefinition
          foreach ($role in $allRoles) {
              if ($role.DisplayName -eq "HTH Device Recovery Operator") { continue }
              $perms = $role.RolePermissions.ResourceActions.AllowedResourceActions
              $hasWipe = $perms | Where-Object {
                  $_ -match "Wipe|Retire|FactoryReset"
              }
              if ($hasWipe) {
                  Write-Warning "Role '$($role.DisplayName)' has destructive permissions: $($hasWipe -join ', ')"
                  Write-Host "  -> Remove these permissions from this role" -ForegroundColor Yellow
              }
          }
          
          Write-Host "`nEnsure only HTH Device Recovery Operator retains wipe permissions." -ForegroundColor Cyan
          Write-Host "Protect this role with PIM (eligible only, 2-hour max, require approval)." -ForegroundColor Cyan

"5.2":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-5.02-wipe-rate-alerting.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-5.02-wipe-rate-alerting.ps1"
    excerpts:
      kql:
        content: |2
          // KQL Detection Rule: Mass Device Wipe (Stryker-Pattern Detection)
          // Deploy in Microsoft Sentinel as a Scheduled Analytics Rule
          // Severity: High | Run every: 15 minutes | Lookup: 1 hour
          IntuneAuditLogs
          | where TimeGenerated > ago(1h)
          | where OperationName in ("wipeDevice", "retireDevice", "deleteDevice", "cleanWindowsDevice")
          | summarize
              WipeCount     = count(),
              DevicesWiped  = make_set(TargetDisplayName, 50),
              FirstAction   = min(TimeGenerated),
              LastAction    = max(TimeGenerated)
              by InitiatedByUserPrincipalName
          | where WipeCount > 10
          | extend AlertTitle = strcat("CRITICAL: ", InitiatedByUserPrincipalName,
              " initiated ", WipeCount, " device wipe actions in 1 hour")
          | project AlertTitle, InitiatedByUserPrincipalName, WipeCount,
              FirstAction, LastAction, DevicesWiped

"6.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-6.01-token-protection.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-6.01-token-protection.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Enable Continuous Access Evaluation (CAE) ---
          Write-Host "=== Enabling Continuous Access Evaluation ===" -ForegroundColor Cyan
          
          # CAE is enabled tenant-wide via Conditional Access settings
          # Strict enforcement mode ensures near-real-time token revocation
          Write-Host "Navigate to: Entra admin center > Protection > Conditional Access > Continuous access evaluation" -ForegroundColor Yellow
          Write-Host "Set to: Strictly enforce location policies" -ForegroundColor Yellow
          
          # --- Create token protection CA policy for admin sessions ---
          Write-Host "`n=== Creating Token Protection CA Policy ===" -ForegroundColor Cyan
          
          $intuneAdminRoleId   = "3a2c62db-5318-420d-8d74-23affee5d9d5"
          $globalAdminRoleId   = "62e90394-69f5-4237-9190-012177145e10"
          $securityAdminRoleId = "194ae4cb-b126-40b2-bd5b-6091b380977d"
          
          $tokenProtectionPolicy = @{
              DisplayName = "HTH-TokenProtection-Admins"
              State       = "enabled"
              Conditions  = @{
                  Users = @{
                      IncludeRoles = @($intuneAdminRoleId, $globalAdminRoleId, $securityAdminRoleId)
                  }
                  Applications = @{
                      IncludeApplications = @("All")
                  }
              }
              SessionControls = @{
                  SignInTokenProtection = @{
                      IsEnabled                     = $true
                      TokenProtectionEnforcementMode = "enforced"
                  }
              }
          }
          
          New-MgIdentityConditionalAccessPolicy -BodyParameter $tokenProtectionPolicy
          Write-Host "Created CA policy: HTH-TokenProtection-Admins" -ForegroundColor Green
          Write-Host "Admin tokens are now device-bound and protected against theft/replay" -ForegroundColor Green

"6.2":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-6.02-token-theft-investigation.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-6.02-token-theft-investigation.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Query risky sign-ins for Intune admin accounts ---
          Write-Host "=== Checking Risky Sign-Ins for Admin Accounts ===" -ForegroundColor Cyan
          
          $intuneAdmins = Get-MgDirectoryRoleMember -DirectoryRoleId (
              Get-MgDirectoryRole -Filter "displayName eq 'Intune Administrator'" |
              Select-Object -ExpandProperty Id
          )
          
          foreach ($admin in $intuneAdmins) {
              $userId = $admin.Id
              $displayName = $admin.AdditionalProperties.displayName
          
              $riskySignIns = Get-MgRiskyUser -Filter "id eq '$userId'" -ErrorAction SilentlyContinue
              if ($riskySignIns -and $riskySignIns.RiskLevel -ne "none") {
                  Write-Warning "RISKY USER: $displayName | Risk Level: $($riskySignIns.RiskLevel) | State: $($riskySignIns.RiskState)"
                  Write-Host "  Action: Investigate in Microsoft Defender XDR > Identity > Risky users" -ForegroundColor Red
              } else {
                  Write-Host "OK: $displayName - No risk detected" -ForegroundColor Green
              }
          }
          
          # --- Token theft response procedure ---
          Write-Host "`n=== Token Theft Response Procedure ===" -ForegroundColor Yellow
          Write-Host "If a compromised admin session is detected:" -ForegroundColor White
          Write-Host "  1. Revoke all sessions: Revoke-MgUserSignInSession -UserId <userId>" -ForegroundColor White
          Write-Host "  2. Disable account: Update-MgUser -UserId <userId> -AccountEnabled:`$false" -ForegroundColor White
          Write-Host "  3. Review Intune audit logs for unauthorized actions during session" -ForegroundColor White
          Write-Host "  4. Reverse unauthorized device actions if possible" -ForegroundColor White
          Write-Host "  5. Reset credentials and re-provision FIDO2 keys" -ForegroundColor White
          Write-Host "  6. Re-enable account after investigation completes" -ForegroundColor White

"7.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-7.01-audit-logging.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-7.01-audit-logging.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Configure Intune diagnostic settings to export logs to Log Analytics ---
          Write-Host "=== Configuring Intune Diagnostic Log Export ===" -ForegroundColor Cyan
          
          $workspaceName      = "hth-intune-logs"
          $resourceGroupName  = "rg-security-monitoring"
          $subscriptionId     = (Get-AzContext).Subscription.Id
          
          # Get or create Log Analytics workspace
          $workspace = Get-AzOperationalInsightsWorkspace `
              -ResourceGroupName $resourceGroupName `
              -Name $workspaceName `
              -ErrorAction SilentlyContinue
          
          if (-not $workspace) {
              Write-Host "Creating Log Analytics workspace: $workspaceName" -ForegroundColor Yellow
              $workspace = New-AzOperationalInsightsWorkspace `
                  -ResourceGroupName $resourceGroupName `
                  -Name $workspaceName `
                  -Location "eastus" `
                  -Sku "PerGB2018" `
                  -RetentionInDays 365
          }
          
          $workspaceId = $workspace.ResourceId
          
          # Configure diagnostic settings for Intune
          # Note: Intune diagnostic settings are configured via the Intune admin center
          # or via the Azure Monitor REST API targeting the Microsoft Intune resource provider
          Write-Host "`n=== Intune Diagnostic Settings Configuration ===" -ForegroundColor Cyan
          Write-Host "Navigate to: Intune admin center > Tenant administration > Diagnostics settings" -ForegroundColor Yellow
          Write-Host "Create diagnostic setting: HTH-IntuneAuditExport" -ForegroundColor Yellow
          Write-Host "Select categories:" -ForegroundColor White
          Write-Host "  - AuditLogs (all administrative actions)" -ForegroundColor Green
          Write-Host "  - OperationalLogs (device actions, compliance changes)" -ForegroundColor Green
          Write-Host "  - DeviceComplianceOrg (compliance state changes)" -ForegroundColor Green
          Write-Host "Destination: Log Analytics workspace '$workspaceName'" -ForegroundColor White
          Write-Host "Workspace Resource ID: $workspaceId" -ForegroundColor White
          
          # --- Verify log flow with a test query ---
          Write-Host "`n=== Verification Query ===" -ForegroundColor Cyan
          Write-Host "Run in Log Analytics to verify log flow:" -ForegroundColor Yellow
          Write-Host 'IntuneAuditLogs | take 10 | project TimeGenerated, OperationName, InitiatedByUserPrincipalName' -ForegroundColor White

"7.2":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-7.02-stryker-pattern-detection.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-7.02-stryker-pattern-detection.ps1"
    excerpts:
      kql:
        content: |2
          // === Detection 1: Mass Device Wipe (Primary Stryker TTP) ===
          // Alerts when >10 wipe actions occur within 1 hour from any admin
          // Deploy as Sentinel Scheduled Analytics Rule | Run: 15m | Lookup: 1h
          IntuneAuditLogs
          | where TimeGenerated > ago(1h)
          | where OperationName in ("wipeDevice", "retireDevice", "deleteDevice")
          | summarize WipeCount = count(), Devices = make_set(TargetDisplayName, 50)
              by InitiatedByUserPrincipalName
          | where WipeCount > 10
          
          // === Detection 2: Admin Sign-In from New Device/Location ===
          // Alerts when an Intune admin signs in from previously unseen device or IP
          SigninLogs
          | where TimeGenerated > ago(1h)
          | where AppDisplayName in ("Microsoft Intune", "Microsoft Intune Enrollment")
          | where RiskLevelDuringSignIn in ("medium", "high")
              or ConditionalAccessStatus == "notApplied"
          | join kind=leftanti (
              SigninLogs
              | where TimeGenerated between (ago(90d) .. ago(1h))
              | where AppDisplayName in ("Microsoft Intune", "Microsoft Intune Enrollment")
              | distinct DeviceDetail_deviceId, IPAddress, UserPrincipalName
          ) on DeviceDetail_deviceId, IPAddress, UserPrincipalName
          | project TimeGenerated, UserPrincipalName, IPAddress,
              Location_city, DeviceDetail_operatingSystem, RiskLevelDuringSignIn
          
          // === Detection 3: PIM Activation Outside Business Hours ===
          // Alerts when Intune Administrator role is activated outside 06:00-20:00 local
          AuditLogs
          | where TimeGenerated > ago(24h)
          | where OperationName == "Add member to role completed (PIM activation)"
          | where TargetResources has "Intune Administrator"
          | extend HourOfDay = hourofday(TimeGenerated)
          | where HourOfDay < 6 or HourOfDay > 20
          | project TimeGenerated, InitiatedBy_user_userPrincipalName,
              TargetResources, HourOfDay
          
          // === Detection 4: Rapid RBAC Role Assignment Changes ===
          // Alerts when >3 role assignments are modified within 30 minutes
          IntuneAuditLogs
          | where TimeGenerated > ago(30m)
          | where OperationName has_any ("roleAssignment", "roleDefinition")
          | summarize ChangeCount = count(), Operations = make_set(OperationName)
              by InitiatedByUserPrincipalName
          | where ChangeCount > 3

