"1.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-1.01-enforce-least-privilege-rbac.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-1.01-enforce-least-privilege-rbac.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Audit current Intune role assignments ---
          Write-Host "=== Auditing Intune RBAC Role Assignments ===" -ForegroundColor Cyan
          
          # List all role assignments and their scope
          $roleAssignments = Get-MgDeviceManagementRoleAssignment -ExpandProperty "roleDefinition"
          foreach ($assignment in $roleAssignments) {
              $roleName = $assignment.RoleDefinition.DisplayName
              $members  = $assignment.ResourceScopes -join ", "
              Write-Host "Role: $roleName | Scope: $members"
          }
          
          # Flag any broad assignments (Intune Administrator via Entra directory role)
          Write-Host "`n=== Checking for Broad Entra Directory Role Assignments ===" -ForegroundColor Yellow
          $intuneAdmins = Get-MgDirectoryRoleMember -DirectoryRoleId (
              Get-MgDirectoryRole -Filter "displayName eq 'Intune Administrator'" |
              Select-Object -ExpandProperty Id
          )
          foreach ($admin in $intuneAdmins) {
              Write-Warning "Standing Intune Administrator: $($admin.AdditionalProperties.displayName) ($($admin.Id))"
          }
          
          # --- Create a scoped Help Desk role (read-only, no destructive actions) ---
          Write-Host "`n=== Creating Scoped Help Desk Role ===" -ForegroundColor Cyan
          
          $helpDeskPermissions = @{
              actions = @(
                  "Microsoft.Intune_Organization_Read"
                  "Microsoft.Intune_ManagedDevices_Read"
                  "Microsoft.Intune_ManagedApps_Read"
                  "Microsoft.Intune_RemoteTasks_RemoteAssistance"
              )
              # Explicitly exclude destructive actions
              notActions = @(
                  "Microsoft.Intune_ManagedDevices_Delete"
                  "Microsoft.Intune_ManagedDevices_Wipe"
                  "Microsoft.Intune_ManagedDevices_Retire"
                  "Microsoft.Intune_ManagedDevices_FactoryReset"
              )
          }
          
          $params = @{
              DisplayName     = "HTH Help Desk Operator"
              Description     = "Read-only device access with remote assistance. No wipe, retire, or delete."
              IsBuiltIn       = $false
              RolePermissions = @(@{
                  ResourceActions = $helpDeskPermissions
              })
          }
          
          New-MgDeviceManagementRoleDefinition -BodyParameter $params
          Write-Host "Created role: HTH Help Desk Operator" -ForegroundColor Green

"1.2":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-1.02-implement-scope-tags.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-1.02-implement-scope-tags.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Create scope tags for organizational boundaries ---
          Write-Host "=== Creating Intune Scope Tags ===" -ForegroundColor Cyan
          
          $scopeTags = @(
              @{ DisplayName = "North-America"; Description = "Devices and policies for NA region" }
              @{ DisplayName = "EMEA";          Description = "Devices and policies for EMEA region" }
              @{ DisplayName = "APAC";          Description = "Devices and policies for APAC region" }
              @{ DisplayName = "Manufacturing"; Description = "Manufacturing floor devices" }
              @{ DisplayName = "Corporate-IT";  Description = "Corporate office endpoints" }
          )
          
          foreach ($tag in $scopeTags) {
              $existing = Get-MgDeviceManagementRoleScopeTag -Filter "displayName eq '$($tag.DisplayName)'" -ErrorAction SilentlyContinue
              if ($existing) {
                  Write-Host "Scope tag already exists: $($tag.DisplayName)" -ForegroundColor Yellow
              } else {
                  New-MgDeviceManagementRoleScopeTag -DisplayName $tag.DisplayName -Description $tag.Description
                  Write-Host "Created scope tag: $($tag.DisplayName)" -ForegroundColor Green
              }
          }
          
          # --- Verify scope tag assignments on existing role assignments ---
          Write-Host "`n=== Auditing Role Assignments Without Scope Tags ===" -ForegroundColor Yellow
          $assignments = Get-MgDeviceManagementRoleAssignment
          foreach ($assignment in $assignments) {
              if (-not $assignment.ScopeMembers -or $assignment.ScopeMembers.Count -eq 0) {
                  Write-Warning "Role assignment '$($assignment.DisplayName)' has NO scope tags (global scope)"
              }
          }

"2.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-2.01-require-phishing-resistant-mfa.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-2.01-require-phishing-resistant-mfa.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Create Conditional Access policy requiring phishing-resistant MFA for Intune admins ---
          Write-Host "=== Creating Conditional Access Policy: Phishing-Resistant MFA ===" -ForegroundColor Cyan
          
          # Intune Administrator role template ID
          $intuneAdminRoleId   = "3a2c62db-5318-420d-8d74-23affee5d9d5"
          # Global Administrator role template ID
          $globalAdminRoleId   = "62e90394-69f5-4237-9190-012177145e10"
          # Security Administrator role template ID
          $securityAdminRoleId = "194ae4cb-b126-40b2-bd5b-6091b380977d"
          
          # Microsoft Intune app ID
          $intuneAppId         = "0000000a-0000-0000-c000-000000000000"
          # Microsoft Graph app ID
          $graphAppId          = "00000003-0000-0000-c000-000000000000"
          
          # Built-in phishing-resistant authentication strength ID
          $phishResistantStrengthId = "00000000-0000-0000-0000-000000000004"
          
          $caPolicy = @{
              DisplayName = "HTH-Require-PhishResistant-MFA-IntuneAdmins"
              State       = "enabled"
              Conditions  = @{
                  Users = @{
                      IncludeRoles = @($intuneAdminRoleId, $globalAdminRoleId, $securityAdminRoleId)
                  }
                  Applications = @{
                      IncludeApplications = @($intuneAppId, $graphAppId)
                  }
              }
              GrantControls = @{
                  Operator                      = "OR"
                  AuthenticationStrength = @{
                      Id = $phishResistantStrengthId
                  }
              }
              SessionControls = @{
                  SignInFrequency = @{
                      Value     = 1
                      Type      = "hours"
                      IsEnabled = $true
                      AuthenticationType = "primaryAndSecondaryAuthentication"
                  }
              }
          }
          
          New-MgIdentityConditionalAccessPolicy -BodyParameter $caPolicy
          Write-Host "Created CA policy: HTH-Require-PhishResistant-MFA-IntuneAdmins" -ForegroundColor Green

"2.2":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-2.02-conditional-access-admin-portals.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-2.02-conditional-access-admin-portals.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Create CA policy requiring compliant device for admin portal access ---
          Write-Host "=== Creating CA Policy: Compliant Device for Admin Portals ===" -ForegroundColor Cyan
          
          $intuneAdminRoleId   = "3a2c62db-5318-420d-8d74-23affee5d9d5"
          $globalAdminRoleId   = "62e90394-69f5-4237-9190-012177145e10"
          $securityAdminRoleId = "194ae4cb-b126-40b2-bd5b-6091b380977d"
          
          # Microsoft Admin Portals service principal
          $adminPortalsAppId = "c44b4083-3bb0-49c1-b47d-974e53cbdf3c"
          $intuneAppId       = "0000000a-0000-0000-c000-000000000000"
          $graphAppId        = "00000003-0000-0000-c000-000000000000"
          
          $phishResistantStrengthId = "00000000-0000-0000-0000-000000000004"
          
          $compliancePolicy = @{
              DisplayName = "HTH-AdminPortal-ComplianceRequired"
              State       = "enabled"
              Conditions  = @{
                  Users = @{
                      IncludeRoles = @($intuneAdminRoleId, $globalAdminRoleId, $securityAdminRoleId)
                  }
                  Applications = @{
                      IncludeApplications = @($adminPortalsAppId, $intuneAppId, $graphAppId)
                  }
                  ClientAppTypes = @("browser", "mobileAppsAndDesktopClients")
              }
              GrantControls = @{
                  Operator        = "AND"
                  BuiltInControls = @("compliantDevice")
                  AuthenticationStrength = @{
                      Id = $phishResistantStrengthId
                  }
              }
              SessionControls = @{
                  SignInFrequency = @{
                      Value     = 1
                      Type      = "hours"
                      IsEnabled = $true
                  }
              }
          }
          
          New-MgIdentityConditionalAccessPolicy -BodyParameter $compliancePolicy
          Write-Host "Created CA policy: HTH-AdminPortal-ComplianceRequired" -ForegroundColor Green
          
          # --- Block legacy authentication for admin accounts ---
          Write-Host "`n=== Creating CA Policy: Block Legacy Auth for Admins ===" -ForegroundColor Cyan
          
          $blockLegacyPolicy = @{
              DisplayName = "HTH-BlockLegacyAuth-Admins"
              State       = "enabled"
              Conditions  = @{
                  Users = @{
                      IncludeRoles = @($intuneAdminRoleId, $globalAdminRoleId, $securityAdminRoleId)
                  }
                  Applications = @{
                      IncludeApplications = @("All")
                  }
                  ClientAppTypes = @("exchangeActiveSync", "other")
              }
              GrantControls = @{
                  Operator        = "OR"
                  BuiltInControls = @("block")
              }
          }
          
          New-MgIdentityConditionalAccessPolicy -BodyParameter $blockLegacyPolicy
          Write-Host "Created CA policy: HTH-BlockLegacyAuth-Admins" -ForegroundColor Green

"3.1":
  cli:
    lang: "powershell"
    filename: "hth-microsoft-intune-3.01-enable-pim.ps1"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/microsoft-intune/cli/hth-microsoft-intune-3.01-enable-pim.ps1"
    excerpts:
      powershell:
        content: |2
          # --- Configure PIM settings for Intune Administrator role ---
          Write-Host "=== Configuring PIM for Intune Administrator Role ===" -ForegroundColor Cyan
          
          $intuneAdminRoleId = "3a2c62db-5318-420d-8d74-23affee5d9d5"
          
          # Get the PIM role management policy for Intune Administrator
          $policies = Get-MgPolicyRoleManagementPolicy -Filter "scopeId eq '/' and scopeType eq 'DirectoryRole'"
          $intunePolicy = $policies | Where-Object {
              $_.RoleDefinitionId -eq $intuneAdminRoleId
          }
          
          if ($intunePolicy) {
              $policyId = $intunePolicy.Id
          
              # Update activation rules: max 4 hours, require justification and MFA
              $rules = Get-MgPolicyRoleManagementPolicyRule -UnifiedRoleManagementPolicyId $policyId
          
              # Set maximum activation duration to 4 hours
              $expirationRule = $rules | Where-Object { $_.Id -eq "Expiration_EndUser_Assignment" }
              if ($expirationRule) {
                  Update-MgPolicyRoleManagementPolicyRule -UnifiedRoleManagementPolicyId $policyId `
                      -UnifiedRoleManagementPolicyRuleId $expirationRule.Id `
                      -BodyParameter @{
                          "@odata.type"       = "#microsoft.graph.unifiedRoleManagementPolicyExpirationRule"
                          id                  = $expirationRule.Id
                          isExpirationRequired = $true
                          maximumDuration     = "PT4H"
                          target              = @{
                              caller     = "EndUser"
                              operations = @("All")
                              level      = "Assignment"
                          }
                      }
                  Write-Host "Set max activation duration: 4 hours" -ForegroundColor Green
              }
          
              # Require justification on activation
              $enablementRule = $rules | Where-Object { $_.Id -eq "Enablement_EndUser_Assignment" }
              if ($enablementRule) {
                  Update-MgPolicyRoleManagementPolicyRule -UnifiedRoleManagementPolicyId $policyId `
                      -UnifiedRoleManagementPolicyRuleId $enablementRule.Id `
                      -BodyParameter @{
                          "@odata.type" = "#microsoft.graph.unifiedRoleManagementPolicyEnablementRule"
                          id            = $enablementRule.Id
                          enabledRules  = @("Justification", "MultiFactorAuthentication")
                          target        = @{
                              caller     = "EndUser"
                              operations = @("All")
                              level      = "Assignment"
                          }
                      }
                  Write-Host "Enabled: Require justification + MFA on activation" -ForegroundColor Green
              }
          
              # Require approval for activation
              $approvalRule = $rules | Where-Object { $_.Id -eq "Approval_EndUser_Assignment" }
              if ($approvalRule) {
                  Write-Host "Configure approval settings in Entra admin center > PIM > Intune Administrator > Settings > Require approval" -ForegroundColor Yellow
                  Write-Host "Approvers must be designated security team members" -ForegroundColor Yellow
              }
          
              Write-Host "`nPIM configured for Intune Administrator role" -ForegroundColor Green
          } else {
              Write-Warning "Could not find PIM policy for Intune Administrator role"
          }
          
          # --- Convert active assignments to eligible ---
          Write-Host "`n=== Converting Active Assignments to Eligible ===" -ForegroundColor Cyan
          
          $activeAssignments = Get-MgRoleManagementDirectoryRoleAssignment -Filter "roleDefinitionId eq '$intuneAdminRoleId'"
          foreach ($assignment in $activeAssignments) {
              $principalName = (Get-MgUser -UserId $assignment.PrincipalId -ErrorAction SilentlyContinue).DisplayName
              Write-Warning "Active assignment found: $principalName ($($assignment.PrincipalId))"
              Write-Host "  -> Convert to Eligible in PIM > Intune Administrator > Assignments" -ForegroundColor Yellow
          }
          
          if ($activeAssignments.Count -eq 0) {
              Write-Host "No standing active Intune Administrator assignments found" -ForegroundColor Green
          }

