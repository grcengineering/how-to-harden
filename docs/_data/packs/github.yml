          # Create a hardened code security configuration
          gh api --method POST \
            "/orgs/${GITHUB_ORG}/code-security/configurations" \
            -f name="hth-hardened" \
            -f description="How To Harden security baseline configuration" \
            -f dependency_graph="enabled" \
            -f dependabot_alerts="enabled" \
            -f dependabot_security_updates="enabled" \
            -f secret_scanning="enabled" \
            -f secret_scanning_push_protection="enabled" \
            -f code_scanning_default_setup="enabled" \
            -f private_vulnerability_reporting="enabled"
      api-attach-security-config:
        content: |2
          # Attach a security configuration to all repositories in the organization
          CONFIG_ID="${1:?Usage: $0 <config_id>}"
          gh api --method POST \
            "/orgs/${GITHUB_ORG}/code-security/configurations/${CONFIG_ID}/attach" \
            -f scope="all"
  cli:
    lang: "yaml"
    filename: "hth-github-3.19-artifact-attestation-workflow.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-3.19-artifact-attestation-workflow.yml"
    excerpts:
      workflow-artifact-attestation:
        content: |2
          name: Build and Attest
          on:
            push:
              branches: [main]
            release:
              types: [published]
          
          permissions:
            id-token: write
            contents: read
            attestations: write
          
          jobs:
            build-and-attest:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
          
                - name: Build artifact
                  run: |
                    # Replace with your build steps
                    make build
                    echo "ARTIFACT_PATH=dist/my-app" >> "$GITHUB_ENV"
          
                - name: Generate artifact attestation
                  uses: actions/attest-build-provenance@v2
                  with:
                    subject-path: ${{ env.ARTIFACT_PATH }}
      workflow-container-attestation:
        content: |2
          build-and-attest-container:
            runs-on: ubuntu-latest
            permissions:
              id-token: write
              contents: read
              attestations: write
              packages: write
            steps:
              - uses: actions/checkout@v4
          
              - name: Log in to GHCR
                uses: docker/login-action@v3
                with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
          
              - name: Build and push image
                id: build
                uses: docker/build-push-action@v6
                with:
                  push: true
                  tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          
              - name: Generate container attestation
                uses: actions/attest-build-provenance@v2
                with:
                  subject-name: ghcr.io/${{ github.repository }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
  sigma:
    - lang: "yaml"
      filename: "hth-github-3.19-enable-code-security-configurations.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-3.19-enable-code-security-configurations.yml"
      excerpts:
