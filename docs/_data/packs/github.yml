"3.19":
  cli:
    lang: "yaml"
    filename: "hth-github-3.19-artifact-attestation-workflow.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-3.19-artifact-attestation-workflow.yml"
    excerpts:
      workflow-artifact-attestation:
        content: |
            name: Build and Attest
            on:
            push:
              branches: [main]
            release:
              types: [published]
          
            permissions:
            id-token: write
            contents: read
            attestations: write
          
            jobs:
            build-and-attest:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
          
                - name: Build artifact
                  run: |
                    # Replace with your build steps
                    make build
                    echo "ARTIFACT_PATH=dist/my-app" >> "$GITHUB_ENV"
          
                - name: Generate artifact attestation
                  uses: actions/attest-build-provenance@v2
                  with:
                    subject-path: ${{ env.ARTIFACT_PATH }}
      workflow-container-attestation:
        content: |
            build-and-attest-container:
              runs-on: ubuntu-latest
              permissions:
                id-token: write
                contents: read
                attestations: write
                packages: write
              steps:
                - uses: actions/checkout@v4
          
                - name: Log in to GHCR
                  uses: docker/login-action@v3
                  with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
          
                - name: Build and push image
                  id: build
                  uses: docker/build-push-action@v6
                  with:
                    push: true
                    tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          
                - name: Generate container attestation
                  uses: actions/attest-build-provenance@v2
                  with:
                    subject-name: ghcr.io/${{ github.repository }}
                    subject-digest: ${{ steps.build.outputs.digest }}
                    push-to-registry: true

"3.20":
  api:
    lang: "bash"
    filename: "hth-github-3.20-verify-attestations.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-3.20-verify-attestations.sh"
    excerpts:
      api-verify-attestation:
        content: |
            # Verify a binary artifact attestation using the GitHub CLI
            # Usage: Replace PATH/TO/ARTIFACT with your build artifact
            gh attestation verify PATH/TO/ARTIFACT \
            -R "${GITHUB_ORG}/${REPO}"
          
            # Verify a container image attestation
            gh attestation verify oci://ghcr.io/${GITHUB_ORG}/${REPO}:latest \
            -R "${GITHUB_ORG}/${REPO}"
          
            # Verify with specific SBOM predicate type (SPDX)
            gh attestation verify PATH/TO/ARTIFACT \
            -R "${GITHUB_ORG}/${REPO}" \
            --predicate-type https://spdx.dev/Document/v2.3

"3.21":
  api:
    lang: "bash"
    filename: "hth-github-3.21-configure-oidc-claims.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-3.21-configure-oidc-claims.sh"
    excerpts:
      api-customize-oidc-claims:
        content: |
            # Customize OIDC subject claims to include repository, environment, and job_workflow_ref
            # This restricts which workflows can assume cloud roles
            info "3.21 Customizing OIDC subject claims for ${GITHUB_ORG}/${REPO}..."
            RESPONSE=$(gh_put "/repos/${GITHUB_ORG}/${REPO}/actions/oidc/customization/sub" '{
            "use_default": false,
            "include_claim_keys": [
              "repo",
              "context",
              "job_workflow_ref"
            ]
            }') || {
            fail "3.21 Failed to customize OIDC claims"
            increment_failed
            summary
            exit 0
            }
          
            # Verify the customization
            info "3.21 Current OIDC subject claim template:"
            gh_get "/repos/${GITHUB_ORG}/${REPO}/actions/oidc/customization/sub" \
            | jq '.'
          
            # Set organization-level OIDC defaults
            info "3.21 Setting organization OIDC subject claim template..."
            gh_put "/orgs/${GITHUB_ORG}/actions/oidc/customization/sub" '{
            "include_claim_keys": [
              "repo",
              "context",
              "job_workflow_ref"
            ]
            }'

"4.1":
