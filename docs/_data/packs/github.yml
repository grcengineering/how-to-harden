"4.7":
  api:
    lang: "bash"
    filename: "hth-github-4.07-audit-github-app-permissions.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.07-audit-github-app-permissions.sh"
    excerpts:
      api-audit-github-apps:
        content: |
            # List all GitHub App installations in the organization
            info "4.07 Listing GitHub App installations..."
            INSTALLATIONS=$(gh_get "/orgs/${GITHUB_ORG}/installations") || {
            fail "4.07 Unable to retrieve installations (requires org admin)"
            increment_failed
            summary
            exit 0
            }
          
            echo "${INSTALLATIONS}" | jq '.installations[] | {
            app_slug: .app_slug,
            app_id: .app_id,
            target_type: .target_type,
            repository_selection: .repository_selection,
            permissions: .permissions,
            created_at: .created_at,
            updated_at: .updated_at
            }'
          
            # Flag apps with excessive permissions
            echo "${INSTALLATIONS}" | jq -r '.installations[] |
            select(.permissions.administration == "write" or
                   .permissions.members == "write" or
                   .permissions.organization_administration == "write") |
            "REVIEW: \(.app_slug) has elevated permissions: \(.permissions | keys | join(", "))"'

"4.8":
  api:
    lang: "bash"
    filename: "hth-github-4.08-enforce-fine-grained-pats.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.08-enforce-fine-grained-pats.sh"
    excerpts:
      api-list-fine-grained-pats:
        content: |
            # List active fine-grained PATs in the organization
            info "4.08 Listing fine-grained personal access tokens..."
            PATS=$(gh_get "/orgs/${GITHUB_ORG}/personal-access-tokens?per_page=100") || {
            warn "4.08 Unable to list PATs (requires org admin with fine_grained_pat scope)"
            }
          
            echo "${PATS}" | jq '.[] | {
            id: .id,
            owner: .owner.login,
            repository_selection: .repository_selection,
            permissions: .permissions,
            access_granted_at: .access_granted_at,
            token_expired: .token_expired,
            token_expires_at: .token_expires_at
            }'
          
            # List pending PAT requests
            info "4.08 Listing pending PAT access requests..."
            REQUESTS=$(gh_get "/orgs/${GITHUB_ORG}/personal-access-token-requests?per_page=100") || {
            warn "4.08 Unable to list PAT requests"
            }
            echo "${REQUESTS}" | jq '.[] | {id: .id, owner: .owner.login, reason: .reason}'
      api-restrict-pat-policy:
        content: |
            # Restrict PAT access to the organization (require approval)
            info "4.08 Setting fine-grained PAT policy to require approval..."
            gh_patch "/orgs/${GITHUB_ORG}" '{
            "personal_access_token_requests_enabled": true
            }' || {
            warn "4.08 Unable to set PAT policy (may require enterprise admin)"
            }
            pass "4.08 Fine-grained PAT approval requirement configured"

