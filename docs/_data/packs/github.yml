            }
  api:
    lang: "bash"
    filename: "hth-github-4.01-enable-vulnerability-alerts.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.01-enable-vulnerability-alerts.sh"
