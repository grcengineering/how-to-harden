"3.19":
  api:
    lang: "bash"
    filename: "hth-github-3.19-enable-code-security-configurations.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-3.19-enable-code-security-configurations.sh"
