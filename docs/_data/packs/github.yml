"2.7":
  api:
    lang: "bash"
    filename: "hth-github-2.07-monitor-security-alerts.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-2.07-monitor-security-alerts.sh"
    excerpts:
      api-list-dependabot-alerts:
        content: |
            # List critical/high severity alerts
            gh api /orgs/{org}/dependabot/alerts --jq '.[] | select(.severity == "critical" or .severity == "high") | {repo: .repository.name, package: .security_advisory.package.name, severity: .severity}'
      api-list-secret-scanning-alerts:
        content: |
            # List active secret alerts
            gh api /orgs/{org}/secret-scanning/alerts?state=open --jq '.[] | {repo: .repository.name, secret_type: .secret_type, created_at: .created_at}'

"2.8":
  cli:
    lang: "bash"
    filename: "hth-github-2.08-configure-commit-signing.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-2.08-configure-commit-signing.sh"
    excerpts:
      cli-configure-commit-signing:
        content: |
            # Configure Git to sign commits with SSH key
            git config --global gpg.format ssh
            git config --global user.signingkey ~/.ssh/id_ed25519.pub
            git config --global commit.gpgsign true
          
            # Configure Git to sign commits with GPG key
            git config --global user.signingkey YOUR_GPG_KEY_ID
            git config --global commit.gpgsign true
          
            # Verify a signed commit
            git log --show-signature -1

"2.9":
  api:
    lang: "bash"
    filename: "hth-github-2.09-configure-push-rules.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-2.09-configure-push-rules.sh"
    excerpts:
      api-create-push-rules:
        content: |
            # Create organization push ruleset to restrict dangerous file types
            info "2.09 Creating push rules ruleset..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/rulesets" '{
            "name": "File Protection Push Rules",
            "enforcement": "active",
            "target": "push",
            "bypass_actors": [
              {"actor_id": 1, "actor_type": "OrganizationAdmin", "bypass_mode": "always"}
            ],
            "conditions": {
              "repository_name": {
                "include": ["~ALL"],
                "exclude": []
              }
            },
            "rules": [
              {
                "type": "file_extension_restriction",
                "parameters": {
                  "restricted_file_extensions": [".exe", ".dll", ".so", ".dylib", ".bin", ".jar", ".war", ".class"]
                }
              },
              {
                "type": "max_file_size",
                "parameters": {
                  "max_file_size": 10
                }
              },
              {
                "type": "file_path_restriction",
                "parameters": {
                  "restricted_file_paths": [".github/workflows/**"]
                }
              }
            ]
            }') || {
            fail "2.09 Failed to create push rules ruleset"
            increment_failed
            summary
            exit 0
            }
          
            # List rulesets to confirm creation
            info "2.09 Current rulesets:"
            gh_get "/orgs/${GITHUB_ORG}/rulesets" \
            | jq '.[] | {name: .name, enforcement: .enforcement, target: .target}'

"2.10":
  api:
    lang: "bash"
    filename: "hth-github-2.10-enable-delegated-bypass.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-2.10-enable-delegated-bypass.sh"
    excerpts:
      api-check-push-protection-bypasses:
        content: |
            # Audit push protection bypass events via secret scanning alerts
            info "2.10 Listing push protection bypass alerts..."
            ALERTS=$(gh_get "/repos/${GITHUB_ORG}/${REPO}/secret-scanning/alerts?state=open&per_page=100") || {
            warn "2.10 Unable to list secret scanning alerts (may require GHAS license)"
            }
          
            if [ -n "${ALERTS}" ]; then
            BYPASS_COUNT=$(echo "${ALERTS}" | jq '[.[] | select(.push_protection_bypassed == true)] | length')
            if [ "${BYPASS_COUNT}" -gt "0" ]; then
              warn "2.10 ${BYPASS_COUNT} alert(s) with push protection bypass detected"
              echo "${ALERTS}" | jq -r '.[] | select(.push_protection_bypassed == true) | "\(.secret_type) | bypassed by: \(.push_protection_bypassed_by.login // "unknown") | \(.created_at)"'
            else
              pass "2.10 No push protection bypasses detected"
            fi
            fi
          
            # Check org-level security configuration for push protection
            info "2.10 Checking organization code security configuration..."
            ORG_SECURITY=$(gh_get "/orgs/${GITHUB_ORG}/code-security/configurations") || {
            warn "2.10 Unable to retrieve org security configurations"
            }
          
            if [ -n "${ORG_SECURITY}" ]; then
            echo "${ORG_SECURITY}" | jq '.[] | {name: .name, secret_scanning_push_protection: .secret_scanning_push_protection}'
            fi

"3.1":
