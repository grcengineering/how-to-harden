  cli:
    lang: "bash"
    filename: "hth-github-3.24-detect-tag-poisoning.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-3.24-detect-tag-poisoning.sh"
    excerpts:
      cli-detect-tag-poisoning:
        content: |2
          # Audit 1: Find action references NOT pinned to full SHAs
          echo "=== Unpinned Action References ==="
          find .github/workflows -name '*.yml' -o -name '*.yaml' | while read -r file; do
            grep -nE 'uses:\s+[^#]+@' "$file" | \
              grep -vE '@[0-9a-f]{40}' | \
              while read -r line; do
                echo "  $file:$line"
              done
          done
          echo "Fix: npx pin-github-action .github/workflows/*.yml"
          
          # Audit 2: Verify pinned SHAs match expected tagged versions
          echo ""
          echo "=== SHA Verification ==="
          find .github/workflows -name '*.yml' -o -name '*.yaml' | while read -r file; do
            grep -oE 'uses:\s+([a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+)@([0-9a-f]{40})\s+#\s*(v[0-9]+[^\s]*)' "$file" | \
              sed 's/uses:\s*//' | while read -r match; do
                action=$(echo "$match" | cut -d'@' -f1)
                sha=$(echo "$match" | cut -d'@' -f2 | cut -d' ' -f1)
                expected_tag=$(echo "$match" | grep -oE 'v[0-9]+[^\s]*')
                if [ -n "$expected_tag" ]; then
                  actual_sha=$(gh api "repos/$action/git/ref/tags/$expected_tag" \
                    --jq '.object.sha' 2>/dev/null || echo "FAILED")
                  if [ "$actual_sha" = "$sha" ]; then
                    echo "  OK: $action@$expected_tag"
                  elif [ "$actual_sha" = "FAILED" ]; then
                    echo "  WARN: $action@$expected_tag (API error)"
                  else
                    echo "  ALERT: $action@$expected_tag SHA MISMATCH!"
                    echo "    Pinned:  $sha"
                    echo "    Current: $actual_sha"
                    echo "    Possible tag poisoning!"
                  fi
                fi
              done
          done
          
          # Dependabot config for automatic SHA updates
          # File: .github/dependabot.yml
          cat <<'DEPENDABOT'
          
          # Recommended: .github/dependabot.yml
          version: 2
          updates:
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                actions:
                  patterns: ["*"]
          DEPENDABOT

"3.25":
  api:
    lang: "bash"
    filename: "hth-github-3.25-expression-injection.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-3.25-expression-injection.sh"
    excerpts:
      audit-expression-injection:
        content: |2
          # Scan all workflow files for unsafe ${{ }} expression interpolation in run: blocks.
          # Flags patterns where user-controlled GitHub context is injected directly into
          # shell commands without going through an environment variable first.
          #
          # SAFE:   env: { TITLE: "${{ github.event.pull_request.title }}" }
          #         run: echo "$TITLE"
          # UNSAFE: run: echo "${{ github.event.pull_request.title }}"
          #
          # Usage: ./hth-github-3.25-expression-injection.sh [workflow-dir]
          
          WORKFLOW_DIR="${1:-.github/workflows}"
          FINDINGS=0
          
          echo "=== GitHub Actions Expression Injection Audit ==="
          echo "Scanning: ${WORKFLOW_DIR}"
          echo ""
          
          # Dangerous GitHub context expressions that can contain user-controlled input.
          # These must NEVER appear inside run: blocks — only in env: blocks.
          DANGEROUS_EXPRESSIONS=(
            'github\.event\.issue\.title'
            'github\.event\.issue\.body'
            'github\.event\.pull_request\.title'
            'github\.event\.pull_request\.body'
            'github\.event\.comment\.body'
            'github\.event\.review\.body'
            'github\.event\.discussion\.title'
            'github\.event\.discussion\.body'
            'github\.event\.pages\.\*\.page_name'
            'github\.event\.commits\.\*\.message'
            'github\.event\.commits\.\*\.author\.name'
            'github\.event\.head_commit\.message'
            'github\.event\.head_commit\.author\.name'
            'github\.event\.workflow_run\.head_branch'
            'github\.event\.workflow_run\.head_commit\.message'
            'github\.head_ref'
            'github\.ref_name'
          )
          
          if [ ! -d "${WORKFLOW_DIR}" ]; then
            echo "No workflow directory found at ${WORKFLOW_DIR}"
            exit 0
          fi
          
          for workflow in "${WORKFLOW_DIR}"/*.yml "${WORKFLOW_DIR}"/*.yaml; do
            [ -f "$workflow" ] || continue
            filename=$(basename "$workflow")
          
            for pattern in "${DANGEROUS_EXPRESSIONS[@]}"; do
              # Find lines in run: blocks that contain ${{ <dangerous_expression> }}
              # We look for the pattern anywhere on lines that are part of a run: block
              matches=$(grep -nE "\\\$\{\{[^}]*${pattern}" "$workflow" 2>/dev/null || true)
              if [ -n "$matches" ]; then
                # Filter: only flag if the line is inside a run: block (not env: block)
                echo "$matches" | while IFS= read -r match; do
                  line_num=$(echo "$match" | cut -d: -f1)
                  # Check context: is this line inside a run: block or an env: block?
                  # Look backwards from this line for the nearest run: or env: key
                  context=$(head -n "$line_num" "$workflow" | tail -20 | grep -E '^\s*(run:|env:)' | tail -1)
                  if echo "$context" | grep -q "run:"; then
                    echo "  [VULNERABLE] ${filename}:${line_num} — ${pattern}"
                    echo "    $(echo "$match" | cut -d: -f2-)"
                    echo "    FIX: Move to env: block, reference via \$ENV_VAR in run:"
                    FINDINGS=$((FINDINGS + 1))
                  fi
                done
              fi
            done
          done
          
          echo ""
          echo "=== Audit Complete ==="
          echo "Expression injection risks found: ${FINDINGS}"
          
          if [ "$FINDINGS" -gt 0 ]; then
            echo ""
            echo "REMEDIATION: For each finding, replace the dangerous \${{ }} expression"
            echo "in the run: block with an environment variable reference."
            echo ""
            echo "  BEFORE (vulnerable):"
            echo "    run: echo \"\${{ github.event.issue.title }}\""
            echo ""
            echo "  AFTER (safe):"
            echo "    env:"
            echo "      ISSUE_TITLE: \"\${{ github.event.issue.title }}\""
            echo "    run: echo \"\$ISSUE_TITLE\""
            echo ""
            echo "TOOLS: Install zizmor for comprehensive static analysis:"
            echo "  cargo install zizmor   # or: brew install zizmor"
            echo "  zizmor .github/workflows/"
            echo ""
            echo "See: howtoharden.com/guides/github/#313"
            exit 1
          fi
          
          echo "No expression injection risks detected."
          exit 0
      zizmor-ci-workflow:
        content: |2
          # GitHub Actions workflow to run zizmor as a CI check on workflow changes.
          # Catches expression injection, unpinned actions, excessive permissions,
          # and other supply chain risks before they merge.
          #
          # Source: github.com/zizmorcore/zizmor-action
          # License: MIT
          #
          # name: Workflow Security Lint
          # on:
          #   pull_request:
          #     paths:
          #       - '.github/workflows/**'
          #       - '.github/actions/**'
          #
          # permissions:
          #   contents: read
          #   security-events: write
          #
          # jobs:
          #   zizmor:
          #     runs-on: ubuntu-latest
          #     steps:
          #       - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
          #
          #       - name: Run zizmor
          #         uses: zizmorcore/zizmor-action@9124bf3aa36c9e18df7cba08e1bbe26db56e4496  # v1
          #         with:
          #           sarif-file: zizmor-results.sarif
          #
          #       - name: Upload SARIF
          #         uses: github/codeql-action/upload-sarif@v3
          #         if: always()
          #         with:
          #           sarif_file: zizmor-results.sarif
          #           category: zizmor

"4.1":
  terraform:
    lang: "hcl"
    filename: "hth-github-4.01-enable-vulnerability-alerts.tf"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/terraform/hth-github-4.01-enable-vulnerability-alerts.tf"
    excerpts:
      terraform:
        content: |2
          resource "github_repository" "how_to_harden_vuln_alerts" {
            name               = var.repository_name
            vulnerability_alerts = true
          }
  api:
    lang: "bash"
    filename: "hth-github-4.01-enable-vulnerability-alerts.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.01-enable-vulnerability-alerts.sh"
    excerpts:
      api-check-vulnerability-alerts:
        content: |2
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "${GH_API}/repos/${GITHUB_ORG}/${REPO}/vulnerability-alerts" \
            -H "${AUTH_HEADER}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28")
      api-enable-vulnerability-alerts:
        content: |2
          # Enable Dependabot vulnerability alerts on the repository
          info "4.01 Enabling vulnerability alerts..."
          ENABLE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "${GH_API}/repos/${GITHUB_ORG}/${REPO}/vulnerability-alerts" \
            -H "${AUTH_HEADER}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28")
  sigma:
    - lang: "yaml"
      filename: "hth-github-4.01-enable-vulnerability-alerts.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-4.01-enable-vulnerability-alerts.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection:
                    action: 'repository_vulnerability_alerts.disable'
                condition: selection
            fields:
                - actor
                - action
                - org
                - repo
                - created_at

"4.2":
  api:
    lang: "bash"
    filename: "hth-github-4.02-review-open-dependabot-alerts.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.02-review-open-dependabot-alerts.sh"
    excerpts:
      api-audit-dependabot-alerts:
        content: |2
          # Audit: Check for critical and high severity open Dependabot alerts
          info "4.02 Checking critical Dependabot alerts..."
          CRITICAL_ALERTS=$(gh_get "/orgs/${GITHUB_ORG}/dependabot/alerts?state=open&severity=critical&per_page=100" 2>/dev/null) || {
            warn "4.02 Unable to query Dependabot alerts (may require security_events scope)"
            CRITICAL_ALERTS="[]"
          }
          CRITICAL_COUNT=$(echo "${CRITICAL_ALERTS}" | jq '. | length' 2>/dev/null || echo "0")
          
          info "4.02 Checking high severity Dependabot alerts..."
          HIGH_ALERTS=$(gh_get "/orgs/${GITHUB_ORG}/dependabot/alerts?state=open&severity=high&per_page=100" 2>/dev/null) || {
            warn "4.02 Unable to query high severity Dependabot alerts"
            HIGH_ALERTS="[]"
          }
          HIGH_COUNT=$(echo "${HIGH_ALERTS}" | jq '. | length' 2>/dev/null || echo "0")
          
          info "4.02 Open alerts -- Critical: ${CRITICAL_COUNT}, High: ${HIGH_COUNT}"
          
          # List affected repositories for critical alerts
          if [ "${CRITICAL_COUNT}" -gt 0 ]; then
            warn "4.02 Repositories with critical alerts:"
            echo "${CRITICAL_ALERTS}" | jq -r '.[].repository.full_name' 2>/dev/null | sort -u | while read -r REPO_NAME; do
              COUNT=$(echo "${CRITICAL_ALERTS}" | jq -r "[.[] | select(.repository.full_name == \"${REPO_NAME}\")] | length" 2>/dev/null)
              warn "4.02   ${REPO_NAME}: ${COUNT} critical alert(s)"
            done
          fi
  sigma:
    - lang: "yaml"
      filename: "hth-github-4.02-review-open-dependabot-alerts.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-4.02-review-open-dependabot-alerts.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection:
                    action: 'repository_vulnerability_alert.dismiss'
                condition: selection
            fields:
                - actor
                - action
                - org
                - repo
                - created_at

"4.3":
  api:
    lang: "bash"
    filename: "hth-github-4.03-audit-deploy-keys.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.03-audit-deploy-keys.sh"
    excerpts:
      api-audit-deploy-keys:
        content: |2
          # Audit: Check for deploy keys with write access (read_only == false)
          KEYS=$(gh_get "/repos/${GITHUB_ORG}/${REPO}/keys") || {
            fail "4.03 Unable to retrieve deploy keys for ${GITHUB_ORG}/${REPO}"
            increment_failed
            summary
            exit 0
          }
          
          TOTAL_KEYS=$(echo "${KEYS}" | jq '. | length' 2>/dev/null || echo "0")
          WRITE_KEYS=$(echo "${KEYS}" | jq '[.[] | select(.read_only == false)] | length' 2>/dev/null || echo "0")
          READ_KEYS=$((TOTAL_KEYS - WRITE_KEYS))
          
          info "4.03 Found ${TOTAL_KEYS} deploy key(s): ${READ_KEYS} read-only, ${WRITE_KEYS} read-write"
          
          # List write-access keys for review
          if [ "${WRITE_KEYS}" -gt 0 ]; then
            warn "4.03 Deploy keys with WRITE access (review required):"
            echo "${KEYS}" | jq -r '.[] | select(.read_only == false) | "  ID: \(.id) | Title: \(.title) | Created: \(.created_at)"' 2>/dev/null
          fi
  sigma:
    - lang: "yaml"
      filename: "hth-github-4.03-audit-deploy-keys.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-4.03-audit-deploy-keys.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection:
                    action: 'deploy_key.create'
                condition: selection
            fields:
                - actor
                - action
                - org
                - repo
                - created_at

"4.4":
  api:
    lang: "bash"
    filename: "hth-github-4.04-audit-oauth-apps.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.04-audit-oauth-apps.sh"
    excerpts:
      api-list-oauth-apps:
        content: |2
          # List organization authorized OAuth apps
          info "4.04 Listing authorized OAuth apps for ${GITHUB_ORG}..."
          APPS=$(gh_get "/orgs/${GITHUB_ORG}/installations") || {
            warn "4.04 Unable to retrieve app list (may require admin scope)"
          }
          echo "${APPS}" | jq '.installations[] | {app: .app_slug, permissions: .permissions, created_at: .created_at}'
          
          # NOTE: The /applications endpoint was deprecated by GitHub in 2019.
          # Use the Admin Console (Settings > OAuth Apps) to review personal OAuth authorizations.
  sigma:
    - lang: "yaml"
      filename: "hth-github-4.04-audit-oauth-apps.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-4.04-audit-oauth-apps.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection_install:
                    action:
                        - 'integration_installation.create'
                        - 'integration_installation.destroy'
                selection_oauth:
                    action:
                        - 'oauth_authorization.create'
                        - 'oauth_authorization.destroy'
                condition: selection_install or selection_oauth
            fields:
                - actor
                - action
                - org
                - repo
                - created_at

"4.5":
  cli:
    lang: "yaml"
    filename: "hth-github-4.05-dependency-review-workflow.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-4.05-dependency-review-workflow.yml"
    excerpts:
      cli-dependency-review:
        content: |2
          name: Dependency Review
          
          on: [pull_request]
          
          permissions:
            contents: read
            pull-requests: write
          
          jobs:
            dependency-review:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
          
                - name: Dependency Review
                  uses: actions/dependency-review-action@c74b580d73376b7750d3d2a50bfb8adc2c937507
                  with:
                    fail-on-severity: moderate
                    deny-licenses: GPL-2.0, GPL-3.0

"4.6":
  sdk:
    lang: "python"
    filename: "hth-github-4.06-audit-oauth-apps.py"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/sdk/hth-github-4.06-audit-oauth-apps.py"
    excerpts:
      sdk-audit-oauth-apps:
        content: |2
          from github import Github
          import os
          
          g = Github(os.environ['GITHUB_TOKEN'])
          org = g.get_organization('your-org')
          
          print("Authorized OAuth Apps:")
          print("=" * 60)
          
          # Note: GitHub API doesn't provide full OAuth app list
          # This must be done via UI or GraphQL API
          # Placeholder for manual review tracking
          
          apps = [
              {"name": "CircleCI", "last_used": "2025-12-01", "keep": True},
              {"name": "Old-CI-Tool", "last_used": "2023-06-15", "keep": False},
          ]
          
          for app in apps:
              status = "Keep" if app["keep"] else "Revoke"
              print(f"{status}: {app['name']} (last used: {app['last_used']})")

"4.7":
  api:
    lang: "bash"
    filename: "hth-github-4.07-enable-artifact-attestations.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.07-enable-artifact-attestations.sh"
    excerpts:
      api-list-attestations:
        content: |2
          # List existing artifact attestations for a specific artifact digest
          # Replace DIGEST with the actual artifact digest (sha256:...)
          DIGEST="${1:-sha256:example}"
          gh api "/orgs/${GITHUB_ORG}/attestations/${DIGEST}" \
            --jq '.attestations[] | {bundle_media_type: .bundle.mediaType, verified: .bundle.verificationMaterial}'
      api-verify-attestation:
        content: |2
          # Verify artifact attestation using the GitHub CLI
          # Replace IMAGE with the container image or artifact path
          IMAGE="${1:?Usage: $0 <image_or_artifact>}"
          gh attestation verify "${IMAGE}" \
            --owner "${GITHUB_ORG}"
  cli:
    lang: "yaml"
    filename: "hth-github-4.07-enable-artifact-attestations.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-4.07-enable-artifact-attestations.yml"
    excerpts:
      attestation-workflow:
        content: |2
          name: Build and Attest
          on:
            push:
              tags: ['v*']
          
          permissions:
            id-token: write
            contents: read
            attestations: write
            packages: write
          
          jobs:
            build-and-attest:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
          
                - name: Build artifact
                  run: |
                    # Replace with your actual build command
                    make build
                    sha256sum dist/artifact > dist/artifact.sha256
          
                - name: Generate artifact attestation
                  uses: actions/attest-build-provenance@v2
                  with:
                    subject-path: 'dist/artifact'
          
                - name: Build and push container image
                  id: push
                  uses: docker/build-push-action@v6
                  with:
                    push: true
                    tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          
                - name: Generate container attestation
                  uses: actions/attest-build-provenance@v2
                  with:
                    subject-name: ghcr.io/${{ github.repository }}
                    subject-digest: ${{ steps.push.outputs.digest }}
                    push-to-registry: true
  sigma:
    - lang: "yaml"
      filename: "hth-github-4.07-enable-artifact-attestations.yml"
      source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/siem/sigma/hth-github-4.07-enable-artifact-attestations.yml"
      excerpts:
        detection:
          content: |2
            detection:
                selection:
                    action: 'release.publish'
                condition: selection
            fields:
                - actor
                - action
                - org
                - repo
                - created_at

"4.8":
  api:
    lang: "bash"
    filename: "hth-github-4.08-enforce-fine-grained-pats.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-4.08-enforce-fine-grained-pats.sh"
    excerpts:
      api-list-fine-grained-pats:
        content: |2
          # List active fine-grained PATs in the organization
          info "4.08 Listing fine-grained personal access tokens..."
          PATS=$(gh_get "/orgs/${GITHUB_ORG}/personal-access-tokens?per_page=100") || {
            warn "4.08 Unable to list PATs (requires org admin with fine_grained_pat scope)"
          }
          
          echo "${PATS}" | jq '.[] | {
            id: .id,
            owner: .owner.login,
            repository_selection: .repository_selection,
            permissions: .permissions,
            access_granted_at: .access_granted_at,
            token_expired: .token_expired,
            token_expires_at: .token_expires_at
          }'
          
          # List pending PAT requests
          info "4.08 Listing pending PAT access requests..."
          REQUESTS=$(gh_get "/orgs/${GITHUB_ORG}/personal-access-token-requests?per_page=100") || {
            warn "4.08 Unable to list PAT requests"
          }
          echo "${REQUESTS}" | jq '.[] | {id: .id, owner: .owner.login, reason: .reason}'
      api-restrict-pat-policy:
        content: |2
          # Restrict PAT access to the organization (require approval)
          info "4.08 Setting fine-grained PAT policy to require approval..."
          gh_patch "/orgs/${GITHUB_ORG}" '{
            "personal_access_token_requests_enabled": true
          }' || {
            warn "4.08 Unable to set PAT policy (may require enterprise admin)"
          }
          pass "4.08 Fine-grained PAT approval requirement configured"
  cli:
    lang: "yaml"
    filename: "hth-github-4.08-configure-dependabot-grouped-security-updates.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-4.08-configure-dependabot-grouped-security-updates.yml"
    excerpts:
      dependabot-grouped-config:
        content: |2
          # .github/dependabot.yml - Dependabot configuration with grouped security updates
          version: 2
          updates:
            - package-ecosystem: "npm"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                production-dependencies:
                  dependency-type: "production"
                  update-types:
                    - "patch"
                    - "minor"
                development-dependencies:
                  dependency-type: "development"
                  update-types:
                    - "minor"
                    - "patch"
          
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                actions-updates:
                  patterns:
                    - "*"
          
            - package-ecosystem: "pip"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                pip-all:
                  patterns:
                    - "*"
                  update-types:
                    - "patch"
                    - "minor"

