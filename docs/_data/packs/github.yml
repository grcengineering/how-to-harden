"5.10":
  api:
    lang: "bash"
    filename: "hth-github-5.10-configure-push-protection-bypass.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-5.10-configure-push-protection-bypass.sh"
    excerpts:
      api-list-bypass-requests:
        content: |
            # List push protection bypass requests for the organization
            info "5.10 Listing push protection bypass requests..."
            REPOS=$(gh_get "/orgs/${GITHUB_ORG}/repos?per_page=100&type=all") || {
            fail "5.10 Unable to list repositories"
            increment_failed
            summary
            exit 0
            }
          
            echo "${REPOS}" | jq -r '.[].name' | while read -r REPO; do
            BYPASSES=$(gh_get "/repos/${GITHUB_ORG}/${REPO}/secret-scanning/push-protection-bypasses?per_page=10" 2>/dev/null) || continue
            COUNT=$(echo "${BYPASSES}" | jq 'length' 2>/dev/null || echo "0")
            if [ "${COUNT}" -gt 0 ]; then
              warn "5.10 ${REPO}: ${COUNT} push protection bypass(es) found"
              echo "${BYPASSES}" | jq '.[] | {placeholder_id: .placeholder_id, reason: .reason, actor: .actor.login, created_at: .created_at}'
            fi
            done
      api-configure-delegated-bypass:
        content: |
            # Configure delegated bypass via organization ruleset
            # This requires the push protection bypass to be routed to designated reviewers
            info "5.10 Creating ruleset with delegated bypass configuration..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/rulesets" '{
            "name": "Secret Scanning Push Protection",
            "enforcement": "active",
            "target": "branch",
            "conditions": {
              "ref_name": {
                "include": ["~ALL"],
                "exclude": []
              }
            },
            "bypass_actors": [
              {
                "actor_id": 1,
                "actor_type": "OrganizationAdmin",
                "bypass_mode": "always"
              }
            ],
            "rules": [
              {
                "type": "secret_scanning"
              }
            ]
            }') || {
            warn "5.10 Unable to create push protection ruleset (may already exist)"
            }

"5.11":
  api:
    lang: "bash"
    filename: "hth-github-5.11-define-custom-secret-patterns.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-5.11-define-custom-secret-patterns.sh"
    excerpts:
      api-list-custom-patterns:
        content: |
            # List existing custom secret scanning patterns for the organization
            info "5.11 Listing custom secret scanning patterns..."
            PATTERNS=$(gh_get "/orgs/${GITHUB_ORG}/secret-scanning/custom-patterns") || {
            warn "5.11 Unable to list custom patterns (requires GHAS license)"
            }
            echo "${PATTERNS}" | jq '.[] | {name: .name, pattern: .pattern, scope: .scope, state: .state}'
      api-create-custom-pattern:
        content: |
            # Create a custom secret scanning pattern for internal API keys
            info "5.11 Creating custom secret scanning pattern..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/secret-scanning/custom-patterns" '{
            "name": "Internal API Key",
            "pattern": "internal_api_key_[a-zA-Z0-9]{32}",
            "secret_type": "custom_pattern",
            "scope": "organization"
            }') || {
            warn "5.11 Unable to create custom pattern (may require GHAS license)"
            }
            pass "5.11 Custom secret scanning pattern created"

"6.1":
  api:
    lang: "bash"
    filename: "hth-github-6.01-manual-dependency-review.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-6.01-manual-dependency-review.sh"
    excerpts:
      api-manual-dependency-review:
        content: |
            # Manual dependency review
            gh api /repos/{owner}/{repo}/dependency-graph/compare/main...feature-branch
      api-check-pr-vulnerabilities:
        content: |
            # Check PR for new vulnerabilities
            gh pr view 123 --json reviews

"6.2":
  cli:
    lang: "bash"
    filename: "hth-github-6.02-pin-dependencies-by-ecosystem.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-6.02-pin-dependencies-by-ecosystem.sh"
    excerpts:
      cli-pin-npm:
        content: |
            # Commit package-lock.json (contains hashes)
            git add package-lock.json
          
            # Verify integrity on install
            npm ci --audit
      cli-pin-python:
        content: |
            # Generate requirements with hashes
            pip-compile --generate-hashes requirements.in > requirements.txt
          
            # Install with verification
            pip install --require-hashes -r requirements.txt
      cli-pin-go:
        content: |
            # go.sum contains hashes automatically
            go mod verify
      cli-pin-docker:
        content: |
            # Bad: tag can change
            # FROM node:18
          
            # Good: digest is immutable
            # FROM node:18@sha256:a1b2c3d4...

"6.3":
  cli:
    lang: "yaml"
    filename: "hth-github-6.03-dependabot-grouped-updates.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-6.03-dependabot-grouped-updates.yml"
    excerpts:
      cli-dependabot-grouped-updates:
        content: |
            version: 2
            updates:
            - package-ecosystem: "npm"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                production-dependencies:
                  dependency-type: "production"
                  update-types:
                    - "minor"
                    - "patch"
                development-dependencies:
                  dependency-type: "development"
                  update-types:
                    - "minor"
                    - "patch"
              open-pull-requests-limit: 10
          
            - package-ecosystem: "pip"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                all-pip-dependencies:
                  patterns:
                    - "*"
                  update-types:
                    - "minor"
                    - "patch"
          
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
              groups:
                github-actions:
                  patterns:
                    - "*"

"6.4":
  cli:
    lang: "yaml"
    filename: "hth-github-6.04-npm-provenance-workflow.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-6.04-npm-provenance-workflow.yml"
    excerpts:
      cli-npm-provenance-workflow:
        content: |
            name: Publish with Provenance
          
            on:
            release:
              types: [published]
          
            permissions:
            contents: read
            id-token: write
          
            jobs:
            publish:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
          
                - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
                  with:
                    node-version: "20"
                    registry-url: "https://registry.npmjs.org"
          
                - run: npm ci
          
                - run: npm publish --provenance --access public
                  env:
                    NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

"6.5":
  cli:
    lang: "yaml"
    filename: "hth-github-6.05-attest-build-provenance.yml"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/cli/hth-github-6.05-attest-build-provenance.yml"
    excerpts:
      cli-attest-build-provenance:
        content: |
            name: Build and Attest
          
            on:
            push:
              tags:
                - "v*"
          
            permissions:
            contents: read
            id-token: write
            attestations: write
          
            jobs:
            build-and-attest:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
          
                - name: Build artifact
                  run: |
                    mkdir -p dist
                    # Replace with your actual build command
                    tar -czf dist/release.tar.gz src/
          
                - name: Generate SLSA provenance
                  uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4
                  with:
                    subject-path: "dist/release.tar.gz"

"6.6":
  api:
    lang: "bash"
    filename: "hth-github-6.06-enforce-dependency-review.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-6.06-enforce-dependency-review.sh"
    excerpts:
      api-enforce-dependency-review:
        content: |
            # Create an organization ruleset that requires the dependency-review-action
            info "6.06 Creating required workflow ruleset for dependency review..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/rulesets" '{
            "name": "Require Dependency Review",
            "enforcement": "active",
            "target": "branch",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/main", "refs/heads/master"],
                "exclude": []
              },
              "repository_name": {
                "include": ["~ALL"],
                "exclude": []
              }
            },
            "rules": [
              {
                "type": "workflows",
                "parameters": {
                  "workflows": [
                    {
                      "path": ".github/workflows/dependency-review.yml",
                      "repository_id": 0,
                      "ref": "refs/heads/main"
                    }
                  ]
                }
              }
            ]
            }') || {
            warn "6.06 Unable to create ruleset (may already exist or require Enterprise Cloud)"
            }
            pass "6.06 Dependency review enforcement ruleset created"

"7.1":
  db:
    lang: "spl"
    filename: "hth-github-7.01-splunk-detection-queries.spl"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/db/hth-github-7.01-splunk-detection-queries.spl"
    excerpts:
      db-splunk-unusual-member-additions:
        content: |
            index=github action=org.add_member
          
            | stats count by actor, user
            | where count > 5
      db-splunk-unusual-repo-cloning:
        content: |
            index=github action=git.clone
          
            | stats dc(repo) as unique_repos by actor
            | where unique_repos > 50
      db-splunk-secret-scanning-dismissed:
        content: |
            index=github action=secret_scanning.dismiss_alert
          
            | table _time, actor, repo, alert_id
      db-splunk-branch-protection-removed:
        content: |
            index=github action=protected_branch.destroy
          
            | table _time, actor, repo, branch

"7.2":
  api:
    lang: "bash"
    filename: "hth-github-7.02-configure-copilot-governance.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-7.02-configure-copilot-governance.sh"
    excerpts:
      api-copilot-get-settings:
        content: |
            # Get current Copilot organization settings
            info "7.02 Retrieving Copilot organization settings..."
            SETTINGS=$(gh_get "/orgs/${GITHUB_ORG}/copilot/billing") || {
            warn "7.02 Unable to retrieve Copilot settings (requires manage_billing:copilot scope)"
            }
            echo "${SETTINGS}" | jq '{
            seat_breakdown: .seat_breakdown,
            public_code_suggestions: .public_code_suggestions,
            ide_chat: .ide_chat,
            platform_chat: .platform_chat,
            cli: .cli
            }'
      api-copilot-content-exclusions:
        content: |
            # Get and set Copilot content exclusion rules
            info "7.02 Retrieving Copilot content exclusion rules..."
            EXCLUSIONS=$(gh_get "/orgs/${GITHUB_ORG}/copilot/content_exclusions") || {
            warn "7.02 Unable to retrieve content exclusions"
            }
            echo "${EXCLUSIONS}" | jq '.'
          
            # Set content exclusion rules to protect sensitive paths
            info "7.02 Setting Copilot content exclusion rules..."
            gh_put "/orgs/${GITHUB_ORG}/copilot/content_exclusions" '[
            {
              "repository": "*",
              "paths": [
                "**/.env*",
                "**/secrets/**",
                "**/credentials/**",
                "**/*secret*",
                "**/*credential*",
                "**/*.pem",
                "**/*.key"
              ]
            }
            ]' || {
            warn "7.02 Unable to set content exclusion rules"
            }
            pass "7.02 Copilot content exclusion rules configured"
      api-copilot-audit-usage:
        content: |
            # Audit Copilot usage via the audit log
            info "7.02 Querying Copilot audit events..."
            gh_get "/orgs/${GITHUB_ORG}/audit-log?phrase=action:copilot&per_page=25" \
            | jq '.[] | {action: .action, actor: .actor, created_at: .created_at}' || {
            warn "7.02 Unable to query Copilot audit events"
            }

"7.3":
  api:
    lang: "bash"
    filename: "hth-github-7.03-create-custom-repository-roles.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-7.03-create-custom-repository-roles.sh"
    excerpts:
      api-list-custom-roles:
        content: |
            # List existing custom repository roles
            info "7.03 Listing custom repository roles..."
            ROLES=$(gh_get "/orgs/${GITHUB_ORG}/custom-repository-roles") || {
            warn "7.03 Unable to list custom roles (requires Enterprise Cloud)"
            }
            echo "${ROLES}" | jq '.custom_roles[] | {id: .id, name: .name, base_role: .base_role, permissions: .permissions}'
      api-create-security-reviewer-role:
        content: |
            # Create a Security Reviewer custom role
            info "7.03 Creating Security Reviewer custom role..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/custom-repository-roles" '{
            "name": "Security Reviewer",
            "description": "Can view security alerts and manage security settings",
            "base_role": "read",
            "permissions": [
              "security_events",
              "view_secret_scanning_alerts",
              "dismiss_secret_scanning_alerts",
              "view_dependabot_alerts",
              "dismiss_dependabot_alerts",
              "view_code_scanning_alerts",
              "dismiss_code_scanning_alerts"
            ]
            }') || {
            warn "7.03 Unable to create custom role (may already exist)"
            }
            pass "7.03 Security Reviewer role created"

"7.4":
  api:
    lang: "bash"
    filename: "hth-github-7.04-configure-required-workflows.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-7.04-configure-required-workflows.sh"
    excerpts:
      api-create-required-workflow-ruleset:
        content: |
            # Create an organization ruleset that enforces required workflows
            info "7.04 Creating required workflow ruleset..."
            RESPONSE=$(gh_post "/orgs/${GITHUB_ORG}/rulesets" '{
            "name": "Required Security Workflows",
            "enforcement": "active",
            "target": "branch",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/main", "refs/heads/master"],
                "exclude": []
              },
              "repository_name": {
                "include": ["~ALL"],
                "exclude": ["*.github"]
              }
            },
            "rules": [
              {
                "type": "workflows",
                "parameters": {
                  "workflows": [
                    {
                      "path": ".github/workflows/security-scan.yml",
                      "repository_id": 0,
                      "ref": "refs/heads/main"
                    },
                    {
                      "path": ".github/workflows/dependency-review.yml",
                      "repository_id": 0,
                      "ref": "refs/heads/main"
                    }
                  ]
                }
              }
            ]
            }') || {
            warn "7.04 Unable to create required workflow ruleset"
            }
            pass "7.04 Required workflow ruleset created"
          
            # List existing rulesets
            info "7.04 Current organization rulesets:"
            gh_get "/orgs/${GITHUB_ORG}/rulesets" \
            | jq '.[] | {name: .name, enforcement: .enforcement, id: .id}'

"8.1":
  api:
    lang: "bash"
    filename: "hth-github-8.01-security-overview-dashboard.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/github/api/hth-github-8.01-security-overview-dashboard.sh"
    excerpts:
      api-security-overview-alerts:
        content: |
            # Query organization-wide security alert summary
            info "8.01 Querying Dependabot alerts summary..."
            DEPENDABOT=$(gh_get "/orgs/${GITHUB_ORG}/dependabot/alerts?state=open&severity=critical,high&per_page=100") || {
            warn "8.01 Unable to query Dependabot alerts"
            }
            DEPENDABOT_COUNT=$(echo "${DEPENDABOT}" | jq 'length' 2>/dev/null || echo "0")
          
            info "8.01 Querying secret scanning alerts summary..."
            SECRETS=$(gh_get "/orgs/${GITHUB_ORG}/secret-scanning/alerts?state=open&per_page=100") || {
            warn "8.01 Unable to query secret scanning alerts"
            }
            SECRET_COUNT=$(echo "${SECRETS}" | jq 'length' 2>/dev/null || echo "0")
          
            info "8.01 Querying code scanning alerts summary..."
            CODE=$(gh_get "/orgs/${GITHUB_ORG}/code-scanning/alerts?state=open&severity=critical,error&per_page=100") || {
            warn "8.01 Unable to query code scanning alerts"
            }
            CODE_COUNT=$(echo "${CODE}" | jq 'length' 2>/dev/null || echo "0")
          
            echo ""
            echo "Security Overview Summary for ${GITHUB_ORG}:"
            echo "  Dependabot (critical/high): ${DEPENDABOT_COUNT}"
            echo "  Secret scanning (open):     ${SECRET_COUNT}"
            echo "  Code scanning (critical):   ${CODE_COUNT}"
      api-audit-log-query:
        content: |
            # Query audit log for security-relevant events
            info "8.01 Querying recent security audit events..."
            gh_get "/orgs/${GITHUB_ORG}/audit-log?phrase=action:protected_branch+action:org.update_member&per_page=25" \
            | jq '.[] | {action: .action, actor: .actor, created_at: .created_at, repo: .repo}' || {
            warn "8.01 Unable to query audit log"
            }

