"2.5":
  cli:
    lang: "bash"
    filename: "hth-dockerhub-2.05-build-provenance-attestations.sh"
    source_url: "https://github.com/grcengineering/how-to-harden/blob/main/packs/dockerhub/cli/hth-dockerhub-2.05-build-provenance-attestations.sh"
    excerpts:
      cli-build-provenance-attestations:
        content: |2
          # Build with maximum provenance (SLSA Build L2+)
          docker buildx build \
            --provenance=mode=max \
            --sbom=true \
            -t myorg/myimage:v1 \
            --push .
          
          # Inspect provenance of an image
          docker buildx imagetools inspect myorg/myimage:v1 \
            --format '{{ json .Provenance }}'
          
          # Inspect SBOM of an image
          docker buildx imagetools inspect myorg/myimage:v1 \
            --format '{{ json .SBOM }}'
          
          # Verify build provenance with cosign
          cosign verify-attestation myorg/myimage@sha256:<digest> \
            --type slsaprovenance \
            --certificate-identity-regexp='.*@myorg\.com' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          
          # GitHub Actions: build with attestations
