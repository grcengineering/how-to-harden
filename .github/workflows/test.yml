# How to Harden — CI Test Suite
#
# Runs content lint and build verification on every push/PR.
# Rust-based tooling has moved to grcengineering/OCEAN — Rust lint
# and Rust unit tests are no longer run from this repo.
# Jobs run in parallel for speed; any failure blocks merge.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Content Lint (validate-guides.sh — 7 checks) ──────────────────────────
  lint-content:
    name: Content Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: make lint-content

  # ─── Build Verification (pack sync + Jekyll) ───────────────────────────────
  test-build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs
      - run: make test-build
