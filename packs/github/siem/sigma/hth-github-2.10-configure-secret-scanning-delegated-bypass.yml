title: GitHub Secret Scanning Push Protection Bypassed
id: d5e6f7a8-b9c0-4d1e-2f3a-4b5c6d7e8f90
status: test
description: |
    Detects when a developer bypasses secret scanning push protection to commit a
    detected secret. In organizations with delegated bypass, this should only occur
    after security team approval. Unauthorized bypasses indicate policy violations.
    This corresponds to HTH GitHub control hth-github-2.10-configure-secret-scanning-delegated-bypass (section 2.10, L2).
references:
    - https://howtoharden.com/guides/github/
    - https://docs.github.com/en/code-security/secret-scanning/using-advanced-secret-scanning-and-push-protection-features/delegated-bypass-for-push-protection
author: How to Harden
date: 2026/03/07
tags:
    - attack.defense_evasion
    - attack.t1562
logsource:
    product: github
    service: audit
# HTH Guide Excerpt: begin detection
detection:
    selection:
        action: 'secret_scanning_push_protection.bypass'
    condition: selection
fields:
    - actor
    - action
    - org
    - repo
    - created_at
    - push_protection_bypass_reason
# HTH Guide Excerpt: end detection
falsepositives:
    - Approved bypasses for test secrets or known false positives
level: high
