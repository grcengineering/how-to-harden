title: GitHub Actions Secret Created or Modified
id: f7a8b9c0-d1e2-4345-f6a7-890123456789
status: test
description: |
    Detects when GitHub Actions secrets are created, updated, or deleted at the
    organization or repository level. Unauthorized secret modifications could
    inject malicious credentials or remove required secrets to disrupt deployments.
    This corresponds to HTH GitHub control hth-github-5.09-monitor-secret-access (section 5.9, L1).
references:
    - https://howtoharden.com/guides/github/
    - https://docs.github.com/en/organizations/keeping-your-organization-secure
author: How to Harden
date: 2026/02/14
tags:
    - attack.credential_access
    - attack.t1552
logsource:
    product: github
    service: audit
# HTH Guide Excerpt: begin detection
detection:
    selection:
        action:
            - 'org_secret.create'
            - 'org_secret.update'
            - 'org_secret.remove'
            - 'repo_secret.create'
            - 'repo_secret.update'
            - 'repo_secret.remove'
    condition: selection
fields:
    - actor
    - action
    - org
    - repo
    - created_at
# HTH Guide Excerpt: end detection
falsepositives:
    - Routine secret rotation by platform engineering teams
level: medium
