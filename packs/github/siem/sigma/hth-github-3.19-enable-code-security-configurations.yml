title: GitHub Code Security Configuration Detached from Repository
id: e6f7a8b9-c0d1-4e2f-3a4b-5c6d7e8f9012
status: test
description: |
    Detects when a code security configuration is detached from a repository,
    potentially removing enforced security settings. This could indicate an
    attempt to disable security controls on a specific repository.
    This corresponds to HTH GitHub control hth-github-3.19-enable-code-security-configurations (section 3.19, L1).
references:
    - https://howtoharden.com/guides/github/
    - https://docs.github.com/en/code-security/securing-your-organization/managing-the-security-of-your-organization/managing-your-github-code-security-configuration
author: How to Harden
date: 2026/03/07
tags:
    - attack.defense_evasion
    - attack.t1562
logsource:
    product: github
    service: audit
# HTH Guide Excerpt: begin detection
detection:
    selection:
        action: 'code_security_configuration.detach'
    condition: selection
fields:
    - actor
    - action
    - org
    - repo
    - created_at
# HTH Guide Excerpt: end detection
falsepositives:
    - Planned migration between security configurations
level: high
