id: "github-2.10"
vendor: "github"
title: "Configure Secret Scanning Delegated Bypass"
section: "2.10"
profile_level: 2
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#26-configure-secret-scanning-delegated-bypass"
description: >
  Configure delegated bypass for secret scanning push protection to control who
  can bypass push protection when a secret is detected. By default, any developer
  can bypass push protection with a reason. Delegated bypass requires a designated
  reviewer (security team) to approve bypass requests, ensuring no secret is
  committed without security team awareness and approval.
compliance:
  soc2: ["CC6.1", "CC7.1"]
  nist_800_53: ["AC-3", "AC-6", "IA-5(7)"]
  iso_27001: ["A.10.1.2", "A.9.2.3"]
audit:
  - id: "delegated-bypass-configured"
    description: "Verify secret scanning push protection delegated bypass is configured with designated reviewers"
    api:
      method: GET
      endpoint: "/orgs/{org}/code-security/configurations"
      check: 'true'
    expected: true
remediate:
  api:
    - description: "Configure delegated bypass for push protection via code security configuration"
      method: PATCH
      endpoint: "/orgs/{org}/code-security/configurations/{config_id}"
      body:
        secret_scanning_delegated_bypass: "enabled"
        secret_scanning_delegated_bypass_options:
          reviewers:
            - reviewer_id: "{security_team_id}"
              reviewer_type: "TEAM"
      condition: "!delegated-bypass-configured"
tags: ["secret-scanning", "push-protection", "delegated-bypass", "approval-workflow"]
