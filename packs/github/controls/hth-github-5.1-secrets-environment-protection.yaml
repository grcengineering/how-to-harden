id: "github-5.1"
vendor: "github"
title: "Use GitHub Actions Secrets with Environment Protection"
section: "5.1"
profile_level: 1
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#51-use-github-actions-secrets-with-environment-protection"
description: >
  Store sensitive credentials in GitHub Actions secrets (not hardcoded in code).
  Use environment protection rules to require approval for production secret access.
  Structure secrets at organization, repository, and environment levels for proper
  access control.
compliance:
  soc2: ["CC6.1"]
  nist_800_53: ["SC-12"]
  pci_dss: ["8.2.1"]
audit:
  - id: "environments-exist"
    description: "Verify deployment environments are configured for the repository"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/environments"
      check: '.total_count > 0'
    expected: true
  - id: "environments-have-protection-rules"
    description: "Verify deployment environments have protection rules configured"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/environments"
      check: '[.environments[] | select((.protection_rules | length) == 0)] | length == 0'
    expected: true
remediate:
  api:
    - description: "Create production environment with protection rules"
      method: PUT
      endpoint: "/repos/{org}/{repo}/environments/production"
      body:
        reviewers:
          - type: "Team"
        deployment_branch_policy:
          protected_branches: true
          custom_branch_policies: false
      condition: "!environments-have-protection-rules"
tags: ["secrets", "environments", "deployment", "protection-rules"]
