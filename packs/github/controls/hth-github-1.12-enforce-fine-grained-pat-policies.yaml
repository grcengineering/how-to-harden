id: "github-1.12"
vendor: "github"
title: "Enforce Fine-Grained Personal Access Token Policies"
section: "1.12"
profile_level: 2
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#16-enforce-fine-grained-personal-access-token-policies"
description: >
  Configure organization-level policies for personal access tokens (PATs) to require
  approval for fine-grained tokens and restrict or disable classic PATs. Fine-grained
  PATs offer scoped repository access, mandatory expiration, and organization policy
  enforcement. Classic PATs grant broad, long-lived access that cannot be scoped to
  specific repositories, making them a high-value target for attackers.
compliance:
  soc2: ["CC6.1", "CC6.3"]
  nist_800_53: ["AC-6", "IA-4", "IA-5"]
  iso_27001: ["A.9.2.3", "A.9.4.1"]
  pci_dss: ["7.1", "8.6"]
audit:
  - id: "fine-grained-pat-required"
    description: "Verify organization restricts classic PAT access and requires approval for fine-grained tokens"
    api:
      method: GET
      endpoint: "/orgs/{org}"
      check: 'true'
    expected: true
remediate:
  api:
    - description: "List active fine-grained PATs to audit scope and expiration"
      method: GET
      endpoint: "/orgs/{org}/personal-access-tokens"
      condition: "!fine-grained-pat-required"
tags: ["pat", "tokens", "access-control", "least-privilege", "fine-grained"]
