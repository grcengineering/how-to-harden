id: "github-5.4"
vendor: "github"
title: "Define Custom Secret Scanning Patterns"
section: "5.4"
profile_level: 2
severity: "medium"
guide_url: "https://howtoharden.com/guides/github/#54-define-custom-secret-scanning-patterns"
description: >
  Define custom secret scanning patterns to detect organization-specific
  credentials, internal API keys, and proprietary token formats that GitHub's
  built-in patterns don't cover.
compliance:
  soc2: ["CC6.1"]
  nist_800_53: ["SC-28"]
  iso_27001: ["A.10.1.1"]
audit:
  - id: "list-custom-secret-patterns"
    description: "Verify custom secret scanning patterns are defined"
    api:
      method: GET
      endpoint: "/orgs/{org}/secret-scanning/custom-patterns"
      check: '. | length > 0'
    expected: true
remediate:
  note: >
    In Organization Settings > Code security > Secret scanning, add custom
    patterns for internal credentials using regex with test strings.
tags: ["secrets", "secret-scanning", "custom-patterns"]
