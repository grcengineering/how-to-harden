id: "github-1.8"
vendor: "github"
title: "Restrict Service Account Cross-Organization Access"
section: "1.8"
profile_level: 2
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#18-restrict-service-account-cross-organization-access"
description: >
  Audit and restrict service accounts (bot accounts, machine users, GitHub App installations)
  to a single GitHub organization. Service accounts with membership across multiple organizations
  create a blast radius bridge — compromise of one organization grants the attacker access to
  all connected organizations. The TeamPCP attack (March 2026) exploited the cross-org
  Argon-DevOps-Mgt service account to pivot from the public aquasecurity org to the internal
  aquasec-com org, defacing all 44 internal repositories in a 2-minute scripted burst.
compliance:
  soc2: ["CC6.1", "CC6.3"]
  nist_800_53: ["AC-6(3)", "AC-6(5)"]
  iso_27001: ["A.9.2.3"]
  cis_controls: ["6.8"]
audit:
  - id: "org-members-with-bot-pattern"
    description: "List organization members whose usernames match service account naming patterns (bot, mgt, ci, svc, automation)"
    api:
      method: GET
      endpoint: "/orgs/{org}/members?role=admin"
      check: '[.[] | select(.login | test("(-bot$|-mgt$|-ci$|-svc$|-automation$|^bot-|^svc-)"; "i"))] | length == 0'
    expected: true
  - id: "outside-collaborators-count"
    description: "List outside collaborators who may represent cross-org service accounts"
    api:
      method: GET
      endpoint: "/orgs/{org}/outside_collaborators"
      check: '[.[] | select(.login | test("(-bot$|-mgt$|-ci$|-svc$|-automation$|^bot-|^svc-)"; "i"))] | length == 0'
    expected: true
remediate:
  manual:
    - description: "Inventory all service accounts with cross-org access. Create per-org dedicated accounts or replace with GitHub App installations scoped to specific repositories. Ensure credential rotation uses atomic revocation (revoke old before issuing new)."
tags: ["service-accounts", "cross-org", "least-privilege", "access-control", "supply-chain", "lateral-movement"]
