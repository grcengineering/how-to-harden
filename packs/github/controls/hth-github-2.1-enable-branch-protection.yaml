id: "github-2.1"
vendor: "github"
title: "Enable Branch Protection for All Critical Branches"
section: "2.1"
profile_level: 1
severity: "critical"
guide_url: "https://howtoharden.com/guides/github/#21-enable-branch-protection-for-all-critical-branches"
description: >
  Protect main, master, production, and release branches from direct pushes. Require
  pull requests, reviews, and status checks before merging. Without branch protection,
  any collaborator can push directly to the default branch, bypassing code review.
compliance:
  soc2: ["CC8.1"]
  nist_800_53: ["CM-3", "CM-5"]
  iso_27001: ["A.12.1.2", "A.14.2.2"]
audit:
  - id: "default-branch-protected"
    description: "Verify the default branch has branch protection rules enabled"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/branches/main/protection"
      check: 'has("url")'
    expected: true
  - id: "pr-reviews-required"
    description: "Verify pull request reviews are required before merging"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/branches/main/protection"
      check: '.required_pull_request_reviews != null'
    expected: true
  - id: "enforce-admins"
    description: "Verify branch protection is enforced for admins (no bypass)"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/branches/main/protection"
      check: '.enforce_admins.enabled == true'
    expected: true
remediate:
  api:
    - description: "Enable branch protection on the default branch"
      method: PUT
      endpoint: "/repos/{org}/{repo}/branches/main/protection"
      body:
        required_status_checks: null
        enforce_admins: true
        required_pull_request_reviews:
          required_approving_review_count: 1
          dismiss_stale_reviews: true
        restrictions: null
      condition: "!default-branch-protected"
  terraform:
    resources:
      - type: "github_branch_protection"
        name: "main"
        config:
          repository_id: "how-to-harden"
          pattern: "main"
          enforce_admins: true
          required_pull_request_reviews:
            required_approving_review_count: 1
            dismiss_stale_reviews: true
tags: ["branch-protection", "code-review", "ci-cd", "supply-chain"]
