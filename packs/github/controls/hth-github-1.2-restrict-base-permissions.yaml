id: "github-1.2"
vendor: "github"
title: "Restrict Base Permissions for Organization Members"
section: "1.2"
profile_level: 1
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#12-restrict-base-permissions-for-organization-members"
description: >
  Set default organization member permissions to minimal access. Members should only
  have write access to repositories they actively work on. Default 'write' or 'admin'
  permissions violate least privilege and increase blast radius of compromised accounts.
compliance:
  soc2: ["CC6.2"]
  nist_800_53: ["AC-6"]
  iso_27001: ["A.9.4.1"]
audit:
  - id: "default-permission-restricted"
    description: "Verify default repository permission is 'read' or 'none'"
    api:
      method: GET
      endpoint: "/orgs/{org}"
      check: '.default_repository_permission == "read" or .default_repository_permission == "none"'
    expected: true
  - id: "no-public-repo-creation"
    description: "Verify members cannot create public repositories"
    api:
      method: GET
      endpoint: "/orgs/{org}"
      check: '.members_can_create_public_repositories == false'
    expected: true
  - id: "private-fork-disabled"
    description: "Verify members cannot fork private repositories"
    api:
      method: GET
      endpoint: "/orgs/{org}"
      check: '.members_can_fork_private_repositories == false'
    expected: true
remediate:
  api:
    - description: "Set default repository permission to read"
      method: PATCH
      endpoint: "/orgs/{org}"
      body:
        default_repository_permission: "read"
      condition: "!default-permission-restricted"
    - description: "Disable public repository creation for members"
      method: PATCH
      endpoint: "/orgs/{org}"
      body:
        members_can_create_public_repositories: false
      condition: "!no-public-repo-creation"
  terraform:
    resources:
      - type: "github_organization_settings"
        name: "permissions"
        config:
          default_repository_permission: "read"
          members_can_create_public_repositories: false
          members_can_fork_private_repositories: false
tags: ["access-control", "least-privilege", "permissions", "repository"]
