id: "github-6.1"
vendor: "github"
title: "Enable Dependency Review for Pull Requests"
section: "6.1"
profile_level: 1
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#61-enable-dependency-review-for-pull-requests"
description: >
  Automatically block pull requests that introduce vulnerable or malicious
  dependencies. Catches typosquatting, dependency confusion, and compromised
  packages before they merge into the codebase.
compliance:
  soc2: ["CC7.2"]
  nist_800_53: ["SA-12"]
  iso_27001: ["A.14.2.7"]
audit:
  - id: "dependency-graph-enabled"
    description: "Verify the dependency graph is enabled on the repository"
    api:
      method: GET
      endpoint: "/repos/{org}/how-to-harden"
      check: '.security_and_analysis.dependency_graph.status == "enabled" or .has_issues == true'
    expected: true
  - id: "vulnerability-alerts-enabled"
    description: "Verify vulnerability alerts (Dependabot alerts) are enabled"
    api:
      method: GET
      endpoint: "/repos/{org}/how-to-harden/vulnerability-alerts"
      check: '. == null or . == ""'
    expected: true
remediate:
  api:
    - description: "Enable vulnerability alerts on the repository"
      method: PUT
      endpoint: "/repos/{org}/how-to-harden/vulnerability-alerts"
      condition: "!vulnerability-alerts-enabled"
  terraform:
    resources:
      - type: "github_repository"
        name: "how_to_harden_dep_review"
        config:
          name: "how-to-harden"
          vulnerability_alerts: true
tags: ["dependency-review", "supply-chain", "vulnerabilities", "slsa"]
