id: "github-2.4"
vendor: "github"
title: "Enforce Commit Signing"
section: "2.4"
profile_level: 2
severity: "medium"
guide_url: "https://howtoharden.com/guides/github/#24-enforce-commit-signing"
description: >
  Require cryptographically signed commits to verify commit authenticity and prevent
  tampering. Commit signing provides non-repudiation and ensures commits are genuinely
  from the claimed author. Git allows anyone to set any name/email in commit metadata
  without signing verification.
compliance:
  soc2: ["CC8.1"]
  nist_800_53: ["SI-7"]
  iso_27001: ["A.14.2.7"]
audit:
  - id: "latest-commits-signed"
    description: "Verify the most recent commit on the default branch has a verified signature"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/commits?per_page=1"
      check: '.[0].commit.verification.verified == true'
    expected: true
  - id: "branch-requires-signatures"
    description: "Verify the default branch protection requires signed commits"
    api:
      method: GET
      endpoint: "/repos/{org}/{repo}/branches/main/protection/required_signatures"
      check: '.enabled == true'
    expected: true
remediate:
  note: >
    Commit signing is configured per-developer (GPG/SSH key setup) and enforced via
    branch protection rules or organization rulesets. Enable 'Require signed commits'
    in branch protection rules to enforce this going forward.
  terraform:
    resources:
      - type: "github_branch_protection"
        name: "main_signed"
        config:
          repository_id: "how-to-harden"
          pattern: "main"
          require_signed_commits: true
tags: ["commit-signing", "gpg", "ssh", "integrity", "non-repudiation"]
