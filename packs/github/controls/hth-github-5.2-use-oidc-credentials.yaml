id: "github-5.2"
vendor: "github"
title: "Use OpenID Connect (OIDC) Instead of Long-Lived Credentials"
section: "5.2"
profile_level: 2
severity: "high"
guide_url: "https://howtoharden.com/guides/github/#52-use-openid-connect-oidc-instead-of-long-lived-credentials"
description: >
  Use GitHub Actions OIDC provider to get short-lived cloud credentials instead of
  storing long-lived access keys as secrets. OIDC credentials auto-expire in 15
  minutes, cannot be exfiltrated and reused, and eliminate secret rotation burden.
compliance:
  soc2: ["CC6.1"]
  nist_800_53: ["IA-5(1)"]
  iso_27001: ["A.9.4.2"]
audit:
  - id: "oidc-subject-claim-customized"
    description: "Verify OIDC subject claim template is customized for the organization"
    api:
      method: GET
      endpoint: "/orgs/{org}/actions/oidc/customization/sub"
      check: '.include_claim_keys | length > 0'
    expected: true
remediate:
  note: >
    OIDC adoption requires cloud provider configuration (AWS IAM OIDC Provider,
    GCP Workload Identity Federation, Azure Federated Credentials). Configure the
    OIDC trust relationship in your cloud provider, then update workflows to use
    short-lived tokens instead of stored secrets.
  api:
    - description: "Set OIDC subject claim customization template"
      method: PUT
      endpoint: "/orgs/{org}/actions/oidc/customization/sub"
      body:
        include_claim_keys: ["repo", "context", "ref"]
      condition: "!oidc-subject-claim-customized"
tags: ["oidc", "credentials", "short-lived", "cloud", "slsa"]
