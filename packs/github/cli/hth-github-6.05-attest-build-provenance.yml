# HTH GitHub Control 6.05: SLSA Build Provenance Attestation
# Profile: L2 | NIST: SA-12, SA-15
# Deploy: Copy to .github/workflows/build-attest.yml in your repository

# HTH Guide Excerpt: begin cli-attest-build-provenance
name: Build and Attest

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Build artifact
        run: |
          mkdir -p dist
          # Replace with your actual build command
          tar -czf dist/release.tar.gz src/

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4
        with:
          subject-path: "dist/release.tar.gz"
# HTH Guide Excerpt: end cli-attest-build-provenance
