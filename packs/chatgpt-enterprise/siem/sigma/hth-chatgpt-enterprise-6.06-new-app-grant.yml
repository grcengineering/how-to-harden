title: ChatGPT Workspace Agent New App Grant
id: chatgpt-enterprise-6006-new-app-grant
status: test
description: |
    Detects when a workspace agent is granted access to a new
    connected app. App grants expand the agent's read or write
    surface and may push an agent across the lethal-trifecta
    threshold (private data + untrusted content + external send).
    This rule surfaces every new grant so the agents-admin can
    re-evaluate whether the approval policy still matches the
    expanded capability.
    This corresponds to HTH ChatGPT Enterprise control 6.4
    (section 6.4, L2).
references:
    - https://howtoharden.com/guides/chatgpt-enterprise/#64-detect-cross-connector-exfiltration-patterns
    - https://help.openai.com/en/articles/11509118-admin-controls-security-and-compliance-in-apps-enterprise-edu-and-business
    - https://simonwillison.net/2025/Jun/16/the-lethal-trifecta/
author: How to Harden
date: 2026/05/13
tags:
    - attack.privilege_escalation
    - attack.t1098
logsource:
    product: openai
    service: chatgpt-compliance
# HTH Guide Excerpt: begin detection
# Per OpenAI's Workspace Agents Security Overview (April 29, 2026), the
# Compliance Logs Platform emits connector OAuth resolution events when an
# agent's connector grant is established or refreshed. This is the highest-
# signal moment to evaluate whether the new grant pushes the agent across
# the lethal-trifecta threshold.
detection:
    selection:
        event_type: 'connector.oauth.resolved'
    condition: selection
fields:
    - event_id
    - timestamp
    - actor_email
    - agent_id
    - agent_name
    - connector.name
    - connector.scopes
    - action_control
# HTH Guide Excerpt: end detection
falsepositives:
    - Approved publish of a new agent that requires the granted app
    - Builder iteration on an agent draft (Preview state)
level: medium
