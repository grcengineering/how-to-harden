# HTH LangChain Control 6.1: Enable Audit Logs (Self-Hosted v0.12.33+)
# Profile: L1 | NIST: AU-2, AU-3, AU-12
# https://howtoharden.com/guides/langchain/#61-enable-audit-logs
#
# Audit logs are GA in self-hosted LangSmith v0.12.33 and Enterprise cloud.
# Output is OCSF 1.7.0 — pipe directly to Splunk / Datadog / SIEM of choice.
# Reference: https://kb.langchain.com/articles/5478528798-enabling-audit-logs

# HTH Guide Excerpt: begin config-audit-logs-helm
# Append to your helm values to enable audit logging
config:
  auditLogs:
    enabled: true
    # Emit one JSON-OCSF event per line on stdout for log shipper pickup
    destination: stdout
    # Optional: include request body for sensitive admin actions
    includeRequestBody: true
    # Retention is enforced by your log shipper / SIEM, NOT inside LangSmith
    # Recommended: 365 days minimum for SOC 2 / ISO 27001
# HTH Guide Excerpt: end config-audit-logs-helm

# HTH Guide Excerpt: begin config-fluentbit-langsmith
# Sample Fluent Bit input/output for shipping LangSmith audit logs to Splunk HEC
# Apply as a sidecar or DaemonSet alongside the LangSmith deployment
fluentbit:
  inputs:
    - name: tail
      path: /var/log/containers/langsmith-*.log
      tag: langsmith.audit
      parser: docker
      refreshInterval: 5
  filters:
    # Drop everything that isn't an OCSF audit event
    - name: grep
      match: langsmith.audit
      regex: log .*"category_uid":3.*
  outputs:
    - name: splunk
      match: langsmith.audit
      host: splunk-hec.internal.example.com
      port: 8088
      splunkToken: ${SPLUNK_HEC_TOKEN}
      splunkSendRaw: false
      eventSourcetype: langsmith:audit:ocsf
      eventIndex: security_audit
# HTH Guide Excerpt: end config-fluentbit-langsmith
