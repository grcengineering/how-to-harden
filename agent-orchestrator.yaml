# Agent Orchestrator Configuration for How To Harden
dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [desktop]

projects:
  hth:
    name: How To Harden
    repo: grcengineering/how-to-harden
    path: ~/Code/how-to-harden
    defaultBranch: main
    sessionPrefix: hth

    agentRules: |
      You are working on the How To Harden project (howtoharden.com).
      This is a security hardening guide and Code Pack repository.
      Vendor guides are a Jekyll site in docs/_guides/.
      Code Packs (terraform/api/cli/sdk/db/siem) live in packs/{vendor}/.
      The CLI tooling now lives in the separate grcengineering/OCEAN repo,
      not here.
      Follow existing patterns exactly when creating new files.
      Use scripts/sync-packs-to-data.sh to regenerate Jekyll pack data.
      Use scripts/validate-guides.sh (make lint-content) to verify guides.

    reactions:
      ci-failed:
        auto: true
        action: send-to-agent
        retries: 2
